<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Fixed-arm flywheel 5x10 top section from rear tower</title>
  <desc id="desc">Top section showing the Clawbot rear tower and parallel diagonal arm channels clamped by adapter plates, with 5x5 gussets leading to a 5x10 flywheel cassette.</desc>
  <defs>
    <style>
      .metal{fill:#f3f4f6;stroke:#111827;stroke-width:3;stroke-linejoin:round}
      .channel{fill:#e5e7eb;stroke:#374151;stroke-width:4;stroke-linejoin:round}
      .adapter{fill:#eff6ff;stroke:#2563eb;stroke-width:3;stroke-linejoin:round}
      .gusset{fill:#ede9fe;stroke:#7c3aed;stroke-width:3;stroke-linejoin:round}
      .wheel{fill:#ecfdf5;stroke:#047857;stroke-width:3}
      .bearing{fill:#fff;stroke:#2563eb;stroke-width:3}
      .collar{fill:#fffbeb;stroke:#b45309;stroke-width:3}
      .backplate{fill:#e5e7eb;stroke:#4b5563;stroke-width:3}
      .part{fill:none;stroke:#111827;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
      .dash{fill:none;stroke:#6b7280;stroke-width:2;stroke-dasharray:9 7}
      .label{font:18px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}
      .small{font:15px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#374151}
    </style>
  </defs>
  <rect x="20" y="20" width="1160" height="780" fill="#fff" stroke="#d1d5db" stroke-width="2"/>
  <text x="50" y="62" class="label" style="font-size:28px;font-weight:700">Fixed-arm cassette - top section from rear tower</text>
  <text x="50" y="92" class="small">Top section: adapter clamps the actual rear tower/arm joint; cassette sits outboard of the rear tower to clear the diagonal arm channels.</text>

  <!-- actual rear tower/arm joint seen from above -->
  <rect x="80" y="330" width="250" height="115" rx="10" class="metal"/>
  <polygon points="80,305 330,330 330,365 80,340" class="channel"/>
  <polygon points="80,435 330,410 330,445 80,470" class="channel"/>
  <text x="88" y="285" class="label">rear tower plus paired arm channels</text>
  <text x="92" y="500" class="small">photo side view: two diagonal channels arrive here from the front of robot</text>

  <!-- adapter clamp -->
  <rect x="320" y="280" width="48" height="220" rx="7" class="adapter"/>
  <rect x="392" y="280" width="48" height="220" rx="7" class="adapter"/>
  <line x1="125" y1="348" x2="440" y2="348" class="part"/>
  <line x1="125" y1="428" x2="440" y2="428" class="part"/>
  <text x="300" y="535" class="small">adapter plates bolt through existing tower/arm holes</text>

  <!-- gussets -->
  <polygon points="470,285 575,360 470,435" class="gusset"/>
  <polygon points="470,495 575,420 470,345" class="gusset" opacity="0.72"/>
  <text x="480" y="260" class="label">5x5 gusset load path</text>

  <!-- cassette side plates -->
  <rect x="610" y="210" width="80" height="430" rx="8" class="metal"/>
  <rect x="915" y="210" width="80" height="430" rx="8" class="metal"/>
  <text x="585" y="188" class="label">near 5x10 side plate</text>
  <text x="865" y="188" class="label">far 5x10 side plate</text>
  <line x1="650" y1="250" x2="955" y2="250" class="part"/>
  <line x1="650" y1="600" x2="955" y2="600" class="part"/>
  <text x="710" y="632" class="small">spacers set plate separation; cassette is outboard of tower</text>

  <!-- shaft and wheel -->
  <line x1="650" y1="425" x2="955" y2="425" class="part"/>
  <circle cx="650" cy="425" r="33" class="bearing"/>
  <circle cx="955" cy="425" r="33" class="bearing"/>
  <rect x="700" y="398" width="32" height="54" rx="8" class="collar"/>
  <circle cx="802" cy="425" r="86" class="wheel"/>
  <circle cx="802" cy="425" r="28" fill="#fff" stroke="#047857" stroke-width="3"/>
  <rect x="872" y="398" width="32" height="54" rx="8" class="collar"/>
  <text x="690" y="352" class="label">flywheel shaft is separate from arm shaft</text>

  <!-- ball path and backplate -->
  <rect x="1030" y="285" width="46" height="280" rx="8" class="backplate"/>
  <text x="980" y="255" class="label">adjustable backplate</text>
  <circle cx="970" cy="425" r="36" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/>
  <path d="M735 505 C825 485 925 455 1075 405" class="dash"/>
  <path d="M1075 405 l-24 -3 l14 18" class="part"/>
  <text x="980" y="590" class="small">compression gap set at backplate; keep ball path clear of rear wheel/tower</text>

  <!-- clearance zone -->
  <rect x="500" y="680" width="430" height="56" fill="#f9fafb" stroke="#6b7280" stroke-width="2" stroke-dasharray="8 7"/>
  <text x="520" y="714" class="small">clearance zone: avoid the red arm gear, rear wheel, wiring, and vertical tower</text>
</svg>
