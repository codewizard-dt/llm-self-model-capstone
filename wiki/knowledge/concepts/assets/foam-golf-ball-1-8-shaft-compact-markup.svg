<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="850" viewBox="0 0 1400 850">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
    <marker id="redArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #4b5563; }
      .label { font: 600 17px Arial, sans-serif; fill: #111827; }
      .small { font: 400 14px Arial, sans-serif; fill: #374151; }
      .tiny { font: 400 12px Arial, sans-serif; fill: #4b5563; }
      .note { font: 700 18px Arial, sans-serif; fill: #dc2626; }
      .dim { font: 600 15px Arial, sans-serif; fill: #111827; }
      .outline { fill: none; stroke: #111827; stroke-width: 3; }
      .thin { fill: none; stroke: #374151; stroke-width: 2; }
      .dash { fill: none; stroke: #6b7280; stroke-width: 2; stroke-dasharray: 8 7; }
      .dimline { fill: none; stroke: #111827; stroke-width: 2; marker-start: url(#arrow); marker-end: url(#arrow); }
      .redline { fill: none; stroke: #dc2626; stroke-width: 3; marker-end: url(#redArrow); }
    </style>
  </defs>

  <rect x="25" y="25" width="1350" height="800" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>

  <text x="70" y="82" class="title">Foam golf ball flywheel - compact 1/8 in shaft prototype</text>
  <text x="70" y="114" class="subtitle">Motor outside the blue plate; 2 in claw shaft does not reach the far plate. Backplate is separate and adjustable.</text>

  <!-- Side stack diagram -->
  <text x="70" y="170" class="label">Side stack: true shaft budget</text>
  <line x1="90" y1="430" x2="760" y2="430" stroke="#9ca3af" stroke-width="2"/>

  <!-- Motor -->
  <rect x="95" y="310" width="205" height="240" rx="16" fill="#1f2937" stroke="#111827" stroke-width="3"/>
  <rect x="130" y="340" width="125" height="180" rx="10" fill="#374151" stroke="#111827" stroke-width="2"/>
  <circle cx="300" cy="430" r="34" fill="#111827" stroke="#e5e7eb" stroke-width="5"/>
  <text x="120" y="290" class="label">V5 Smart Motor</text>
  <text x="120" y="578" class="small">Motor outside launcher plate</text>

  <!-- Shaft full length as bar -->
  <rect x="250" y="418" width="360" height="24" fill="#9ca3af" stroke="#111827" stroke-width="2"/>
  <line x1="250" y1="404" x2="250" y2="456" stroke="#111827" stroke-width="2"/>
  <line x1="610" y1="404" x2="610" y2="456" stroke="#111827" stroke-width="2"/>
  <text x="340" y="399" class="dim">2.0 in standard 1/8 in shaft from claw</text>

  <!-- Motor engagement overlay -->
  <rect x="250" y="418" width="85" height="24" fill="#60a5fa" opacity="0.9" stroke="#1d4ed8" stroke-width="2"/>
  <text x="232" y="372" class="small">~0.35-0.50 in hidden</text>
  <line x1="292" y1="376" x2="292" y2="416" class="thin"/>
  <text x="250" y="462" class="tiny">inside motor socket</text>

  <!-- Near plate -->
  <rect x="335" y="250" width="34" height="360" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
  <text x="315" y="230" class="label">near blue VEX plate</text>
  <text x="292" y="638" class="small">normal VEX hole is OK for 1/8 in shaft</text>

  <!-- Spacer -->
  <rect x="380" y="398" width="34" height="64" fill="#f3f4f6" stroke="#6b7280" stroke-width="2"/>
  <text x="372" y="382" class="small">thin washer/spacer</text>

  <!-- Wheel -->
  <circle cx="485" cy="430" r="78" fill="#d1fae5" stroke="#047857" stroke-width="4"/>
  <circle cx="485" cy="430" r="28" fill="#ffffff" stroke="#2563eb" stroke-width="4"/>
  <rect x="462" y="405" width="46" height="50" fill="#bfdbfe" stroke="#2563eb" stroke-width="2" opacity="0.8"/>
  <text x="430" y="330" class="label">2 in 60A compression wheel</text>
  <text x="434" y="354" class="small">uses 1/2 in hex to 1/8 in square adapter</text>

  <!-- Collar -->
  <rect x="585" y="392" width="36" height="76" rx="5" fill="#111827" stroke="#111827" stroke-width="2"/>
  <text x="566" y="376" class="small">rubber collar</text>
  <text x="563" y="488" class="small">shaft retention</text>

  <!-- End warning -->
  <line x1="622" y1="430" x2="716" y2="430" class="redline"/>
  <text x="642" y="396" class="note">shaft ends here</text>
  <text x="642" y="462" class="small">do not plan far-side bearing support</text>

  <!-- Useful length dimension -->
  <line x1="369" y1="535" x2="610" y2="535" class="dimline"/>
  <line x1="369" y1="516" x2="369" y2="555" stroke="#111827" stroke-width="2"/>
  <line x1="610" y1="516" x2="610" y2="555" stroke="#111827" stroke-width="2"/>
  <text x="417" y="562" class="dim">~1.2-1.45 in usable inside launcher</text>

  <!-- Launcher top/ball path diagram -->
  <text x="805" y="170" class="label">Top/through-ball layout</text>
  <rect x="860" y="260" width="34" height="420" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
  <rect x="1135" y="260" width="34" height="420" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
  <text x="828" y="240" class="label">motor-side plate</text>
  <text x="1098" y="240" class="label">far plate / guide</text>

  <!-- Motor and wheel top view -->
  <rect x="700" y="365" width="160" height="130" rx="12" fill="#1f2937" stroke="#111827" stroke-width="3"/>
  <text x="718" y="345" class="small">motor outside</text>
  <rect x="845" y="420" width="210" height="20" fill="#9ca3af" stroke="#111827" stroke-width="2"/>
  <circle cx="1000" cy="430" r="56" fill="#d1fae5" stroke="#047857" stroke-width="4"/>
  <text x="950" y="510" class="small">wheel is cantilevered</text>

  <!-- Backplate -->
  <rect x="1090" y="320" width="18" height="300" fill="#e5e7eb" stroke="#374151" stroke-width="3"/>
  <text x="1055" y="302" class="label">adjustable backplate</text>
  <text x="1044" y="642" class="small">separate from shaft support</text>

  <!-- Foam golf ball -->
  <circle cx="1050" cy="430" r="42" fill="#fef3c7" stroke="#d97706" stroke-width="4"/>
  <text x="1010" y="384" class="label">foam golf ball</text>
  <text x="1012" y="558" class="dim">start gap: 37 mm</text>
  <text x="1012" y="582" class="small">adjust 34-39 mm</text>

  <!-- Ball path -->
  <path d="M 1185 430 C 1238 410 1265 390 1305 355" class="dash"/>
  <path d="M 1185 430 C 1238 450 1265 470 1305 505" class="dash"/>
  <text x="1212" y="340" class="small">exit direction</text>

  <!-- Critical notes -->
  <rect x="70" y="690" width="1260" height="95" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="95" y="725" class="note">Lowest-risk interpretation</text>
  <text x="95" y="752" class="small">Use the claw's 2 in 1/8 in shaft only as a compact cantilever prototype. It holds the wheel; it does not reach the far plate.</text>
  <text x="95" y="775" class="small">If the wheel wobbles, slips, or bends the shaft, move to HS shaft with a 5/16 in clearance hole or a no-drill HS bearing sandwich.</text>
</svg>
