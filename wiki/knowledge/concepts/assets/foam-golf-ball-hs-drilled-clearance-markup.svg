<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
    <marker id="redArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #4b5563; }
      .label { font: 700 17px Arial, sans-serif; fill: #111827; }
      .small { font: 400 14px Arial, sans-serif; fill: #374151; }
      .note { font: 700 18px Arial, sans-serif; fill: #dc2626; }
      .dim { font: 700 15px Arial, sans-serif; fill: #111827; }
      .dimline { fill: none; stroke: #111827; stroke-width: 2; marker-start: url(#arrow); marker-end: url(#arrow); }
      .redline { fill: none; stroke: #dc2626; stroke-width: 3; marker-end: url(#redArrow); }
      .dash { fill: none; stroke: #6b7280; stroke-width: 2; stroke-dasharray: 8 7; }
    </style>
  </defs>

  <rect x="25" y="25" width="1350" height="850" fill="#fff" stroke="#d1d5db" stroke-width="2"/>
  <text x="70" y="82" class="title">HS drilled-clearance layout - motor outside plate</text>
  <text x="70" y="114" class="subtitle">This is the direct answer if the motor is outside: drill/notch a 5/16 in clearance hole so the 1/4 in HS shaft never rubs the steel.</text>

  <text x="70" y="168" class="label">Side stack</text>
  <line x1="80" y1="435" x2="1300" y2="435" stroke="#e5e7eb" stroke-width="2"/>

  <!-- Motor -->
  <rect x="80" y="330" width="190" height="210" rx="14" fill="#1f2937" stroke="#111827" stroke-width="3"/>
  <circle cx="270" cy="435" r="30" fill="#111827" stroke="#e5e7eb" stroke-width="5"/>
  <text x="103" y="308" class="label">V5 Smart Motor outside</text>

  <!-- Shaft -->
  <rect x="226" y="421" width="510" height="28" fill="#9ca3af" stroke="#111827" stroke-width="2"/>
  <text x="362" y="398" class="dim">HS shaft exits motor and passes through clearance hole</text>

  <!-- Motor engagement -->
  <rect x="226" y="421" width="88" height="28" fill="#60a5fa" opacity="0.9" stroke="#1d4ed8" stroke-width="2"/>
  <text x="206" y="470" class="small">hidden in motor socket</text>

  <!-- Near plate with drilled hole -->
  <rect x="360" y="245" width="42" height="380" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
  <circle cx="381" cy="435" r="34" fill="#fff" stroke="#dc2626" stroke-width="5"/>
  <text x="305" y="223" class="label">near blue VEX plate</text>
  <text x="306" y="648" class="note">5/16 in clearance hole</text>
  <path d="M 430 350 L 394 415" class="redline"/>

  <!-- Optional bearing mounted after plate -->
  <rect x="430" y="382" width="120" height="106" rx="14" fill="#111827" stroke="#111827" stroke-width="3"/>
  <circle cx="490" cy="435" r="31" fill="#ffffff" stroke="#9ca3af" stroke-width="5"/>
  <circle cx="450" cy="435" r="10" fill="#d1d5db"/>
  <circle cx="530" cy="435" r="10" fill="#d1d5db"/>
  <text x="418" y="360" class="label">near HS bearing</text>
  <text x="424" y="512" class="small">supports shaft after plate</text>

  <!-- Wheel -->
  <circle cx="655" cy="435" r="80" fill="#d1fae5" stroke="#047857" stroke-width="4"/>
  <circle cx="655" cy="435" r="28" fill="#ffffff" stroke="#7c3aed" stroke-width="4"/>
  <rect x="628" y="408" width="54" height="54" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
  <text x="594" y="315" class="label">2 in compression wheel</text>
  <text x="575" y="338" class="small">1/4 in square-bore VersaHex adapters</text>

  <!-- Collars -->
  <rect x="570" y="390" width="26" height="90" rx="4" fill="#111827"/>
  <rect x="750" y="390" width="26" height="90" rx="4" fill="#111827"/>
  <text x="544" y="374" class="small">HS collar</text>
  <text x="728" y="374" class="small">HS collar</text>

  <!-- Far bearing and plate -->
  <rect x="820" y="382" width="120" height="106" rx="14" fill="#111827" stroke="#111827" stroke-width="3"/>
  <circle cx="880" cy="435" r="31" fill="#ffffff" stroke="#9ca3af" stroke-width="5"/>
  <circle cx="840" cy="435" r="10" fill="#d1d5db"/>
  <circle cx="920" cy="435" r="10" fill="#d1d5db"/>
  <rect x="965" y="245" width="42" height="380" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
  <text x="824" y="360" class="label">far HS bearing</text>
  <text x="929" y="223" class="label">far blue plate</text>

  <!-- Far end warning -->
  <line x1="736" y1="435" x2="815" y2="435" class="dash"/>
  <text x="742" y="510" class="small">2 in HS shaft may be tight</text>

  <!-- Ball/backplate -->
  <circle cx="1080" cy="435" r="43" fill="#fef3c7" stroke="#d97706" stroke-width="4"/>
  <rect x="1130" y="300" width="22" height="270" fill="#e5e7eb" stroke="#374151" stroke-width="3"/>
  <text x="1040" y="376" class="label">foam golf ball</text>
  <text x="1090" y="596" class="dim">start gap: 37 mm</text>
  <text x="1090" y="620" class="small">adjust 34-39 mm</text>

  <!-- Dimension lines -->
  <line x1="402" y1="690" x2="965" y2="690" class="dimline"/>
  <line x1="402" y1="650" x2="402" y2="708" stroke="#111827" stroke-width="2"/>
  <line x1="965" y1="650" x2="965" y2="708" stroke="#111827" stroke-width="2"/>
  <text x="525" y="720" class="dim">launcher plates spaced for foam ball, not racquetball</text>

  <!-- Notes -->
  <rect x="70" y="760" width="1260" height="92" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="95" y="794" class="note">Lowest risk if motor must stay outside</text>
  <text x="95" y="821" class="small">The drilled hole is not a bearing. It is oversized clearance only. The shaft should touch the motor socket, VersaHex adapters, collars, and HS bearings, not the steel plate.</text>
  <text x="95" y="844" class="small">Use a metal-capable 5/16 in bit, clamp the plate, drill slowly, deburr both sides, and test spin before feeding a ball.</text>
</svg>
