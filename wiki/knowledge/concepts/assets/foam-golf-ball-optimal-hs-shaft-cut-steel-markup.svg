<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="950" viewBox="0 0 1500 950">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
    <marker id="redArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #4b5563; }
      .label { font: 700 17px Arial, sans-serif; fill: #111827; }
      .small { font: 400 14px Arial, sans-serif; fill: #374151; }
      .tiny { font: 400 12px Arial, sans-serif; fill: #4b5563; }
      .note { font: 700 18px Arial, sans-serif; fill: #dc2626; }
      .dim { font: 700 15px Arial, sans-serif; fill: #111827; }
      .dimline { fill: none; stroke: #111827; stroke-width: 2; marker-start: url(#arrow); marker-end: url(#arrow); }
      .redline { fill: none; stroke: #dc2626; stroke-width: 3; marker-end: url(#redArrow); }
      .dash { fill: none; stroke: #6b7280; stroke-width: 2; stroke-dasharray: 8 7; }
    </style>
  </defs>

  <rect x="25" y="25" width="1450" height="900" fill="#fff" stroke="#d1d5db" stroke-width="2"/>
  <text x="70" y="82" class="title">Optimal foam golf ball launcher - cut 1/4 in square steel HS shaft</text>
  <text x="70" y="114" class="subtitle">Motor outside, drilled 5/16 in clearance through near plate, two HS bearings, 2 in compression wheel, adjustable backplate.</text>

  <text x="70" y="166" class="label">Side stack: recommended final layout</text>
  <line x1="80" y1="445" x2="1390" y2="445" stroke="#e5e7eb" stroke-width="2"/>

  <!-- Motor -->
  <rect x="80" y="335" width="190" height="220" rx="14" fill="#1f2937" stroke="#111827" stroke-width="3"/>
  <circle cx="270" cy="445" r="30" fill="#111827" stroke="#e5e7eb" stroke-width="5"/>
  <text x="100" y="312" class="label">V5 Smart Motor</text>
  <text x="108" y="582" class="small">outside the launcher plate</text>

  <!-- 1/4 shaft -->
  <rect x="222" y="431" width="650" height="28" fill="#9ca3af" stroke="#111827" stroke-width="2"/>
  <text x="385" y="409" class="dim">cut 1/4 in square steel shaft to 3.0 in first</text>
  <text x="395" y="482" class="small">target final after test-fit: about 2.75-3.00 in</text>

  <!-- motor engagement -->
  <rect x="222" y="431" width="92" height="28" fill="#60a5fa" opacity="0.9" stroke="#1d4ed8" stroke-width="2"/>
  <text x="206" y="487" class="tiny">~0.4-0.5 in in motor socket</text>

  <!-- near plate -->
  <rect x="365" y="245" width="42" height="400" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
  <circle cx="386" cy="445" r="35" fill="#fff" stroke="#dc2626" stroke-width="5"/>
  <text x="310" y="222" class="label">near blue VEX plate</text>
  <text x="304" y="672" class="note">drill 5/16 in clearance</text>
  <path d="M 455 355 L 405 421" class="redline"/>
  <text x="430" y="350" class="small">oversized hole only</text>

  <!-- near bearing -->
  <rect x="438" y="392" width="120" height="106" rx="14" fill="#111827" stroke="#111827" stroke-width="3"/>
  <circle cx="498" cy="445" r="31" fill="#ffffff" stroke="#9ca3af" stroke-width="5"/>
  <circle cx="458" cy="445" r="10" fill="#d1d5db"/>
  <circle cx="538" cy="445" r="10" fill="#d1d5db"/>
  <text x="426" y="370" class="label">near HS bearing</text>
  <text x="424" y="520" class="small">inside face of plate</text>

  <!-- collars and wheel -->
  <rect x="582" y="400" width="28" height="90" rx="4" fill="#111827"/>
  <text x="558" y="384" class="small">HS collar</text>

  <circle cx="690" cy="445" r="82" fill="#d1fae5" stroke="#047857" stroke-width="4"/>
  <circle cx="690" cy="445" r="29" fill="#ffffff" stroke="#7c3aed" stroke-width="4"/>
  <rect x="662" y="417" width="56" height="56" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
  <text x="618" y="320" class="label">2 in 60A compression wheel</text>
  <text x="600" y="344" class="small">use 1/4 in square-bore VersaHex adapters</text>

  <rect x="786" y="400" width="28" height="90" rx="4" fill="#111827"/>
  <text x="760" y="384" class="small">HS collar</text>

  <!-- far bearing and plate -->
  <rect x="845" y="392" width="120" height="106" rx="14" fill="#111827" stroke="#111827" stroke-width="3"/>
  <circle cx="905" cy="445" r="31" fill="#ffffff" stroke="#9ca3af" stroke-width="5"/>
  <circle cx="865" cy="445" r="10" fill="#d1d5db"/>
  <circle cx="945" cy="445" r="10" fill="#d1d5db"/>
  <text x="850" y="370" class="label">far HS bearing</text>
  <text x="848" y="520" class="small">shaft support, not drive</text>

  <rect x="1008" y="245" width="42" height="400" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
  <text x="974" y="222" class="label">far blue VEX plate</text>

  <!-- backplate and ball -->
  <circle cx="1128" cy="445" r="43" fill="#fef3c7" stroke="#d97706" stroke-width="4"/>
  <rect x="1185" y="305" width="22" height="280" fill="#e5e7eb" stroke="#374151" stroke-width="3"/>
  <text x="1088" y="384" class="label">foam golf ball</text>
  <text x="1174" y="288" class="label">adjustable backplate</text>
  <text x="1102" y="614" class="dim">start gap: 37 mm</text>
  <text x="1104" y="638" class="small">tune 34-39 mm</text>

  <!-- Dimension lines -->
  <line x1="365" y1="705" x2="1050" y2="705" class="dimline"/>
  <line x1="365" y1="650" x2="365" y2="723" stroke="#111827" stroke-width="2"/>
  <line x1="1050" y1="650" x2="1050" y2="723" stroke="#111827" stroke-width="2"/>
  <text x="530" y="735" class="dim">plate spacing set by #8-32 standoffs/screws; shaft is independent</text>

  <line x1="222" y1="765" x2="872" y2="765" class="dimline"/>
  <line x1="222" y1="742" x2="222" y2="780" stroke="#111827" stroke-width="2"/>
  <line x1="872" y1="742" x2="872" y2="780" stroke="#111827" stroke-width="2"/>
  <text x="438" y="795" class="dim">cut long first: 3.0 in; trim only after dry-fit</text>

  <!-- Cut/test notes -->
  <rect x="70" y="825" width="1360" height="72" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="95" y="855" class="note">Build rule</text>
  <text x="205" y="855" class="small">Clamp the 3 ft bar; cut a 3 in blank with the jigsaw; file/chamfer all corners; test-fit through motor, adapters, collars, and bearings before final assembly.</text>
  <text x="95" y="878" class="small">The drilled plate hole must never touch the rotating shaft. It is clearance only; support comes from the HS bearings.</text>
</svg>
