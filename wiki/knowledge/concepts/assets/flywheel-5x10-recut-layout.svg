<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Alternate flywheel recut layout: two VEX 5x15 plates cut into 5x10 and 5x5 pieces</title>
  <desc id="desc">Line drawing showing each VEX 5x15 plate cross-cut into one 5x10 long side plate and one 5x5 bracket or gusset piece.</desc>
  <defs>
    <style>
      .plate{fill:#f3f4f6;stroke:#111827;stroke-width:3;rx:8}
      .cut{stroke:#dc2626;stroke-width:4;stroke-dasharray:10 8}
      .hole{fill:#fff;stroke:#374151;stroke-width:2}
      .label{font:19px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}
      .small{font:15px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#374151}
      .useA{fill:#fef3c7;stroke:#d97706;stroke-width:3}
      .useB{fill:#ede9fe;stroke:#7c3aed;stroke-width:3}
    </style>
  </defs>
  <rect x="20" y="20" width="1160" height="720" fill="#fff" stroke="#d1d5db" stroke-width="2"/>
  <text x="50" y="62" class="label" style="font-size:28px;font-weight:700">Plan B: cut each VEX 5x15 plate into 5x10 + 5x5</text>
  <text x="50" y="92" class="small">Use when the flywheel needs more fore-aft adjustment or a larger fixed-arm mounting footprint.</text>

  <g transform="translate(115,140)">
