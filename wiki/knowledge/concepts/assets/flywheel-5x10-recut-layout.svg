  <rect x="55" y="675" width="1090" height="38" fill="#f9fafb" stroke="#111827" stroke-width="2"/>
  <text x="75" y="700" class="small">Result: 2 matched 5x10 long side plates + 2 matched 5x5 gussets. Use Home Depot strap for a long adjustable backplate.</text>
