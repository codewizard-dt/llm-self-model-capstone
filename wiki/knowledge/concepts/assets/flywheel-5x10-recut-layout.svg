      <circle cx="50" cy="133" r="8" class="hole"/><circle cx="100" cy="133" r="8" class="hole"/><circle cx="150" cy="133" r="8" class="hole"/><circle cx="200" cy="133" r="8" class="hole"/><circle cx="250" cy="133" r="8" class="hole"/>
      <circle cx="50" cy="167" r="8" class="hole"/><circle cx="100" cy="167" r="8" class="hole"/><circle cx="150" cy="167" r="8" class="hole"/><circle cx="200" cy="167" r="8" class="hole"/><circle cx="250" cy="167" r="8" class="hole"/>
