      <circle cx="50" cy="333" r="8" class="hole"/><circle cx="100" cy="333" r="8" class="hole"/><circle cx="150" cy="333" r="8" class="hole"/><circle cx="200" cy="333" r="8" class="hole"/><circle cx="250" cy="333" r="8" class="hole"/>
