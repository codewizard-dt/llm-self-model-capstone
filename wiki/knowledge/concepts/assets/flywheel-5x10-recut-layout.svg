    <rect x="0" y="0" width="300" height="333" class="useA" opacity="0.36"/>
    <rect x="0" y="333" width="300" height="167" class="useB" opacity="0.34"/>
    <line x1="-10" y1="333" x2="310" y2="333" class="cut"/>
    <text x="318" y="175" class="label">second 5x10 side plate</text>
    <text x="318" y="425" class="label">second 5x5 gusset</text>
    <g>
      <circle cx="50" cy="33" r="8" class="hole"/><circle cx="100" cy="33" r="8" class="hole"/><circle cx="150" cy="33" r="8" class="hole"/><circle cx="200" cy="33" r="8" class="hole"/><circle cx="250" cy="33" r="8" class="hole"/>
      <circle cx="50" cy="67" r="8" class="hole"/><circle cx="100" cy="67" r="8" class="hole"/><circle cx="150" cy="67" r="8" class="hole"/><circle cx="200" cy="67" r="8" class="hole"/><circle cx="250" cy="67" r="8" class="hole"/>
      <circle cx="50" cy="100" r="8" class="hole"/><circle cx="100" cy="100" r="8" class="hole"/><circle cx="150" cy="100" r="8" class="hole"/><circle cx="200" cy="100" r="8" class="hole"/><circle cx="250" cy="100" r="8" class="hole"/>
