<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Flywheel arm-extension top section</title>
  <desc id="desc">Top section showing red Home Depot straps as arm extensions, blue VEX plates spaced for a racquetball, a flywheel inside the blue box, motor outside one plate, and an adjustable backplate.</desc>
  <defs>
    <style>
      .red{fill:#fee2e2;stroke:#dc2626;stroke-width:5;stroke-linejoin:round}
      .blue{fill:#dbeafe;stroke:#2563eb;stroke-width:4;stroke-linejoin:round}
      .metal{fill:#f3f4f6;stroke:#111827;stroke-width:3;stroke-linejoin:round}
      .wheel{fill:#ecfdf5;stroke:#047857;stroke-width:4}
      .ball{fill:#fff7ed;stroke:#ea580c;stroke-width:4}
      .motor{fill:#eff6ff;stroke:#2563eb;stroke-width:4}
      .backplate{fill:#e5e7eb;stroke:#4b5563;stroke-width:3}
      .part{fill:none;stroke:#111827;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
      .dash{fill:none;stroke:#6b7280;stroke-width:2;stroke-dasharray:9 7}
      .dim{fill:none;stroke:#111827;stroke-width:2;marker-start:url(#arrow);marker-end:url(#arrow)}
      .label{font:18px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}
      .small{font:15px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#374151}
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#111827"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1160" height="780" fill="#fff" stroke="#d1d5db" stroke-width="2"/>
  <text x="50" y="62" class="label" style="font-size:28px;font-weight:700">Top section - blue VEX launcher box spacing</text>
  <text x="50" y="92" class="small">Racquetball travels between blue plates. Red straps only carry the box forward from the arm.</text>

  <!-- arm extensions -->
  <polygon points="80,260 610,330 610,368 80,300" class="red"/>
  <polygon points="80,535 610,465 610,503 80,575" class="red"/>
  <text x="95" y="238" class="label" fill="#dc2626">red steel straps: extension rails</text>

  <!-- blue side plates -->
  <rect x="605" y="250" width="75" height="380" rx="8" class="blue"/>
  <rect x="915" y="250" width="75" height="380" rx="8" class="blue"/>
  <text x="585" y="225" class="label" fill="#2563eb">blue VEX side plates</text>
  <text x="835" y="225" class="small">inside spacing target = 65 mm</text>

  <!-- dimension between blue plates -->
  <line x1="680" y1="190" x2="915" y2="190" class="dim"/>
  <line x1="680" y1="200" x2="680" y2="238" class="part"/>
  <line x1="915" y1="200" x2="915" y2="238" class="part"/>
  <text x="735" y="178" class="label">65 mm inside spacing</text>

  <!-- flywheel and motor -->
  <rect x="990" y="360" width="120" height="90" rx="12" class="motor"/>
  <line x1="915" y1="405" x2="990" y2="405" class="part"/>
  <text x="988" y="340" class="small">motor outside plate</text>
  <circle cx="790" cy="405" r="82" class="wheel"/>
  <circle cx="790" cy="405" r="28" fill="#fff" stroke="#047857" stroke-width="3"/>
  <text x="735" y="512" class="small">flywheel inside blue box</text>

  <!-- backplate and ball path -->
  <rect x="630" y="365" width="42" height="170" rx="7" class="backplate"/>
  <circle cx="702" cy="445" r="43" class="ball"/>
  <path d="M600 445 C705 440 820 415 940 370" class="dash"/>
  <path d="M940 370 l-24 -2 l14 18" class="part"/>
  <text x="585" y="665" class="small">backplate/chute mounts inside blue box opposite wheel</text>

  <!-- wheel rim to backplate dimension -->
  <line x1="672" y1="348" x2="755" y2="348" class="dim"/>
  <text x="680" y="330" class="label">51 mm rim-to-backplate</text>

  <rect x="55" y="690" width="1080" height="48" fill="#f9fafb" stroke="#111827" stroke-width="2"/>
  <text x="75" y="720" class="small">Caveat: if both blue plates support bearings at 65 mm spacing, the ordered 2 in HS shaft may be too short. Use one-side motor support or source a longer shaft/bolt.</text>
</svg>
