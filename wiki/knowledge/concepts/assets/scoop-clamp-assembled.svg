<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Scoop clamp adapter assembled view</title>
  <desc id="desc">Assembled side/top hybrid view showing Clawbot mount, 8 inch strap spine, spoon scoop, two clamps, liner, and anti-slide stop.</desc>
  <defs>
    <style>
      .part{fill:none;stroke:#111827;stroke-width:3;stroke-linejoin:round;stroke-linecap:round}
      .thin{fill:none;stroke:#374151;stroke-width:2;stroke-linecap:round}
      .metal{fill:#f3f4f6;stroke:#111827;stroke-width:3}
      .liner{fill:#e5e7eb;stroke:#4b5563;stroke-width:2}
      .tie{fill:none;stroke:#2563eb;stroke-width:5}
      .strap{fill:none;stroke:#7c3aed;stroke-width:6}
      .stop{fill:#fffbeb;stroke:#b45309;stroke-width:3}
      .label{font:18px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}
      .small{font:15px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#374151}
    </style>
  </defs>
  <rect x="20" y="20" width="1160" height="720" fill="#fff" stroke="#d1d5db" stroke-width="2"/>
  <text x="50" y="62" class="label" style="font-size:28px;font-weight:700">Scoop clamp adapter - assembled view</text>
  <text x="50" y="92" class="small">Side/top hybrid: the strap spine is flat; the spoon sits on top of a rubber liner; clamps wrap around spine + liner + spoon handle.</text>

  <!-- arm and mount -->
  <polygon points="80,360 330,300 350,335 100,395" class="metal"/>
  <polygon points="80,455 330,395 350,430 100,490" class="metal"/>
  <rect x="325" y="292" width="84" height="210" rx="8" class="metal"/>
  <circle cx="367" cy="355" r="12" fill="#fff" stroke="#111827" stroke-width="3"/>
  <circle cx="367" cy="435" r="12" fill="#fff" stroke="#111827" stroke-width="3"/>
  <text x="65" y="330" class="label">existing Clawbot arm + claw mount</text>

  <!-- spine -->
  <rect x="405" y="352" width="430" height="76" rx="8" class="metal"/>
  <g class="thin">
    <circle cx="455" cy="390" r="10"/><circle cx="515" cy="390" r="10"/><circle cx="575" cy="390" r="10"/>
    <circle cx="635" cy="390" r="10"/><circle cx="695" cy="390" r="10"/><circle cx="755" cy="390" r="10"/>
  </g>
  <text x="470" y="465" class="label">8 in strap spine</text>
  <text x="470" y="490" class="small">secured to robot bracket at rear; clamp load spread along plate</text>

  <!-- liner -->
  <rect x="560" y="330" width="270" height="36" rx="10" class="liner"/>
  <text x="595" y="305" class="small">rubber liner under spoon handle</text>

  <!-- spoon handle and bowl -->
  <path d="M580 330 H910 C946 303 1018 292 1078 310 C1140 329 1153 397 1097 432 C1038 468 948 440 910 402 H580 Z" fill="#fff" stroke="#111827" stroke-width="3"/>
  <path d="M955 380 C996 407 1055 407 1105 370" class="thin"/>
  <text x="880" y="520" class="label">spoon/dustpan scoop bowl</text>
  <text x="880" y="545" class="small">front lip slightly up; test with foam ball first</text>

  <!-- clamps -->
  <ellipse cx="610" cy="390" rx="28" ry="85" class="tie"/>
  <ellipse cx="760" cy="390" rx="28" ry="85" class="tie"/>
  <path d="M575 290 H800" class="strap"/>
  <path d="M575 280 l-18 10 l18 10" class="strap"/>
  <path d="M800 280 l18 10 l-18 10" class="strap"/>
  <text x="560" y="590" class="label">two clamp stations</text>
  <text x="560" y="615" class="small">zip ties for tight hold; Velcro is easier to adjust but less rigid</text>

  <!-- stop -->
  <rect x="838" y="322" width="26" height="92" rx="6" class="stop"/>
  <text x="820" y="240" class="label">anti-slide stop behind bowl neck</text>
  <line x1="850" y1="322" x2="860" y2="250" stroke="#b45309" stroke-width="2"/>

  <rect x="70" y="650" width="980" height="56" fill="#f9fafb" stroke="#111827" stroke-width="2"/>
  <text x="90" y="684" class="small">Pass condition: spoon does not rotate under hand twist, does not slide under forward pull, and clamp marks stay fixed after five lift cycles.</text>
</svg>
