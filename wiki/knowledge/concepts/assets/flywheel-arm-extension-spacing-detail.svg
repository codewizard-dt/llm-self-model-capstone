<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Flywheel racquetball spacing detail</title>
  <desc id="desc">Dimension detail for racquetball flywheel spacing: 65 mm blue plate inside spacing, 57 mm racquetball, 51 mm wheel-rim-to-backplate gap, and shaft length caveat.</desc>
  <defs>
    <style>
      .blue{fill:#dbeafe;stroke:#2563eb;stroke-width:4;stroke-linejoin:round}
      .wheel{fill:#ecfdf5;stroke:#047857;stroke-width:4}
      .ball{fill:#fff7ed;stroke:#ea580c;stroke-width:4}
      .backplate{fill:#e5e7eb;stroke:#4b5563;stroke-width:3}
      .dim{fill:none;stroke:#111827;stroke-width:2;marker-start:url(#arrow);marker-end:url(#arrow)}
      .part{fill:none;stroke:#111827;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
      .dash{fill:none;stroke:#6b7280;stroke-width:2;stroke-dasharray:9 7}
      .label{font:20px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}
      .small{font:16px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#374151}
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#111827"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="1160" height="780" fill="#fff" stroke="#d1d5db" stroke-width="2"/>
  <text x="50" y="62" class="label" style="font-size:30px;font-weight:700">Racquetball flywheel spacing detail</text>
  <text x="50" y="95" class="small">Use these numbers for the next physical mockup. All dimensions are starting targets, then tune in 1-2 mm steps.</text>

  <!-- blue plate gap -->
  <rect x="260" y="180" width="58" height="460" rx="8" class="blue"/>
  <rect x="780" y="180" width="58" height="460" rx="8" class="blue"/>
  <line x1="318" y1="155" x2="780" y2="155" class="dim"/>
  <text x="405" y="135" class="label">65 mm blue-plate inside spacing target</text>
  <text x="430" y="685" class="small">acceptable range: 60-70 mm</text>

  <!-- ball clearance -->
  <circle cx="548" cy="420" r="150" class="ball"/>
  <text x="480" y="424" class="label">57 mm racquetball</text>
  <line x1="398" y1="610" x2="698" y2="610" class="dim"/>
  <text x="470" y="645" class="small">ball diameter</text>
  <text x="335" y="350" class="small">about 4 mm side clearance</text>
  <text x="675" y="350" class="small">about 4 mm side clearance</text>

  <!-- wheel and backplate gap -->
  <circle cx="548" cy="260" r="86" class="wheel"/>
  <circle cx="548" cy="260" r="28" fill="#fff" stroke="#047857" stroke-width="3"/>
  <rect x="275" y="255" width="46" height="250" rx="8" class="backplate"/>
  <line x1="321" y1="235" x2="462" y2="235" class="dim"/>
  <text x="335" y="215" class="label">51 mm rim-to-backplate</text>
  <path d="M310 440 C405 415 500 370 620 295" class="dash"/>
  <path d="M620 295 l-24 -3 l14 18" class="part"/>

  <rect x="120" y="720" width="960" height="48" fill="#f9fafb" stroke="#111827" stroke-width="2"/>
  <text x="140" y="750" class="small">Caveat: a two-bearing 65 mm plate gap likely exceeds a 2 in HS shaft stack. Use one-side support for review mockup or source a longer shaft/bolt.</text>
</svg>
