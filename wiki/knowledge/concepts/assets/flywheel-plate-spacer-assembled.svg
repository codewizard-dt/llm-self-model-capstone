<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Flywheel plate-spacer frame assembled view</title>
  <desc id="desc">Assembled front view and side section showing two strap side plates separated by spacers, vertical flywheel disk on a perpendicular shaft, motor, chute, and ball path.</desc>
  <defs>
    <style>
      .part{fill:none;stroke:#111827;stroke-width:3;stroke-linejoin:round;stroke-linecap:round}
      .thin{fill:none;stroke:#374151;stroke-width:2;stroke-linecap:round}
      .dash{fill:none;stroke:#6b7280;stroke-width:2;stroke-dasharray:8 7}
      .metal{fill:#f3f4f6;stroke:#111827;stroke-width:3}
      .back{fill:#e5e7eb;stroke:#4b5563;stroke-width:3}
      .wheel{fill:#ecfdf5;stroke:#047857;stroke-width:3}
      .bearing{fill:#eff6ff;stroke:#2563eb;stroke-width:3}
      .collar{fill:#fffbeb;stroke:#b45309;stroke-width:3}
      .ball{fill:#fff7ed;stroke:#ea580c;stroke-width:3}
      .badball{fill:#fee2e2;stroke:#b91c1c;stroke-width:3}
      .label{font:18px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}
      .small{font:15px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#374151}
    </style>
  </defs>
  <rect x="20" y="20" width="1160" height="780" fill="#fff" stroke="#d1d5db" stroke-width="2"/>
  <text x="50" y="62" class="label" style="font-size:28px;font-weight:700">Flywheel plate-spacer frame - assembled views</text>
  <text x="50" y="92" class="small">Left: front view. Right: side section showing wheel/backplate gap and ball path.</text>

  <!-- front view frame -->
  <text x="80" y="135" class="label">Front view: looking along launch direction</text>
  <rect x="95" y="165" width="120" height="510" rx="12" class="metal"/>
  <rect x="420" y="165" width="120" height="510" rx="12" class="metal"/>
  <g class="thin">
    <circle cx="155" cy="225" r="11"/><circle cx="155" cy="305" r="11"/><circle cx="155" cy="385" r="11"/><circle cx="155" cy="465" r="11"/><circle cx="155" cy="545" r="11"/><circle cx="155" cy="625" r="11"/>
    <circle cx="480" cy="225" r="11"/><circle cx="480" cy="305" r="11"/><circle cx="480" cy="385" r="11"/><circle cx="480" cy="465" r="11"/><circle cx="480" cy="545" r="11"/><circle cx="480" cy="625" r="11"/>
  </g>
  <line x1="155" y1="225" x2="480" y2="225" class="part"/>
  <line x1="155" y1="625" x2="480" y2="625" class="part"/>
  <line x1="155" y1="305" x2="480" y2="305" class="thin"/>
  <line x1="155" y1="545" x2="480" y2="545" class="thin"/>
  <rect x="282" y="398" width="70" height="34" rx="14" class="collar"/>
  <line x1="155" y1="415" x2="480" y2="415" class="part"/>
  <circle cx="318" cy="415" r="92" class="wheel"/>
  <circle cx="318" cy="415" r="32" fill="#fff" stroke="#047857" stroke-width="3"/>
  <circle cx="155" cy="415" r="32" class="bearing"/>
  <circle cx="480" cy="415" r="32" class="bearing"/>
  <rect x="205" y="395" width="30" height="40" rx="7" class="collar"/>
  <rect x="400" y="395" width="30" height="40" rx="7" class="collar"/>
  <text x="95" y="705" class="small">two 12 in straps are side plates; spacer rods/bolts tie them into a ladder frame</text>

  <!-- motor -->
  <rect x="35" y="365" width="95" height="110" rx="12" class="bearing"/>
  <line x1="130" y1="420" x2="155" y2="415" class="part"/>
  <text x="45" y="340" class="small">V5 motor</text>
  <text x="45" y="492" class="small">600 RPM</text>

  <!-- side section -->
  <text x="655" y="135" class="label">Side section: ball path and compression</text>
  <rect x="665" y="175" width="80" height="500" rx="10" class="metal"/>
  <text x="655" y="705" class="small">one side plate hidden in this section view</text>
  <circle cx="805" cy="410" r="82" class="wheel"/>
  <circle cx="805" cy="410" r="28" fill="#fff" stroke="#047857" stroke-width="3"/>
  <rect x="970" y="240" width="55" height="340" rx="8" class="back"/>
  <polygon points="910,520 1025,580 1025,615 910,555" class="back"/>
  <circle cx="900" cy="410" r="42" class="ball"/>
  <path d="M640 410 H858" class="dash"/>
  <path d="M942 410 H1085" class="dash"/>
  <path d="M655 520 C760 500 870 470 1010 430" class="part"/>
  <path d="M1010 430 l-24 -3 l14 18" class="part"/>
  <text x="1040" y="410" class="small">launch out</text>
  <text x="865" y="210" class="label">adjustable backplate</text>
  <text x="865" y="235" class="small">sets compression gap</text>
  <text x="855" y="640" class="small">start with minimal compression for very soft foam; if it pancakes, do not use for flywheel data</text>

  <!-- soft foam warning -->
  <circle cx="735" cy="585" r="35" class="badball"/>
  <path d="M708 585 C725 605 748 605 763 585 C748 565 725 565 708 585" fill="#fff" stroke="#b91c1c" stroke-width="2"/>
  <text x="775" y="575" class="label">very soft foam ball</text>
  <text x="775" y="600" class="small">okay for scoop/feed tests; likely bad for launch consistency</text>
</svg>
