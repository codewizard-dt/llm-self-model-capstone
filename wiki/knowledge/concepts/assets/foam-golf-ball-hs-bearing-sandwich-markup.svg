<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #4b5563; }
      .label { font: 700 17px Arial, sans-serif; fill: #111827; }
      .small { font: 400 14px Arial, sans-serif; fill: #374151; }
      .note { font: 700 18px Arial, sans-serif; fill: #dc2626; }
      .dim { font: 700 15px Arial, sans-serif; fill: #111827; }
      .thin { fill: none; stroke: #374151; stroke-width: 2; }
      .dash { fill: none; stroke: #6b7280; stroke-width: 2; stroke-dasharray: 8 7; }
      .dimline { fill: none; stroke: #111827; stroke-width: 2; marker-start: url(#arrow); marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="25" y="25" width="1350" height="850" fill="#fff" stroke="#d1d5db" stroke-width="2"/>
  <text x="70" y="82" class="title">HS bearing sandwich - no-drill shaft support</text>
  <text x="70" y="114" class="subtitle">The 1/4 in HS shaft sits between plastic HS bearings. It does not pass through unmodified VEX steel plate holes.</text>

  <!-- Exploded side stack -->
  <text x="70" y="168" class="label">Exploded side stack</text>
  <line x1="80" y1="435" x2="1300" y2="435" stroke="#e5e7eb" stroke-width="2"/>

  <!-- Motor -->
  <rect x="80" y="330" width="175" height="210" rx="14" fill="#1f2937" stroke="#111827" stroke-width="3"/>
  <circle cx="255" cy="435" r="30" fill="#111827" stroke="#e5e7eb" stroke-width="5"/>
  <text x="100" y="308" class="label">V5 Smart Motor</text>
  <text x="92" y="566" class="small">motor on same side as shaft cavity</text>

  <!-- Motor side adapter plate -->
  <rect x="330" y="255" width="38" height="360" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
  <text x="285" y="232" class="label">motor-side blue plate</text>
  <text x="278" y="640" class="small">normal holes only; no 5/16 in shaft hole</text>

  <!-- Bearing on inner face -->
  <rect x="384" y="382" width="120" height="106" rx="14" fill="#111827" stroke="#111827" stroke-width="3"/>
  <circle cx="444" cy="435" r="31" fill="#ffffff" stroke="#9ca3af" stroke-width="5"/>
  <circle cx="404" cy="435" r="10" fill="#d1d5db"/>
  <circle cx="484" cy="435" r="10" fill="#d1d5db"/>
  <text x="374" y="360" class="label">HS shaft bearing</text>
  <text x="372" y="510" class="small">bolted to plate face</text>

  <!-- Shaft -->
  <rect x="442" y="421" width="360" height="28" fill="#9ca3af" stroke="#111827" stroke-width="2"/>
  <text x="540" y="400" class="dim">2 in HS shaft captured between bearings</text>
  <text x="548" y="470" class="small">shaft rides in plastic bearing bores, not steel holes</text>

  <!-- Wheel -->
  <circle cx="615" cy="435" r="80" fill="#d1fae5" stroke="#047857" stroke-width="4"/>
  <circle cx="615" cy="435" r="28" fill="#ffffff" stroke="#7c3aed" stroke-width="4"/>
  <rect x="588" y="408" width="54" height="54" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
  <text x="548" y="315" class="label">2 in compression wheel</text>
  <text x="535" y="338" class="small">1/4 in square-bore VersaHex adapters</text>

  <!-- Collars -->
  <rect x="516" y="390" width="26" height="90" rx="4" fill="#111827"/>
  <rect x="710" y="390" width="26" height="90" rx="4" fill="#111827"/>
  <text x="491" y="374" class="small">HS collar</text>
  <text x="688" y="374" class="small">HS collar</text>

  <!-- Far bearing and plate -->
  <rect x="780" y="382" width="120" height="106" rx="14" fill="#111827" stroke="#111827" stroke-width="3"/>
  <circle cx="840" cy="435" r="31" fill="#ffffff" stroke="#9ca3af" stroke-width="5"/>
  <circle cx="800" cy="435" r="10" fill="#d1d5db"/>
  <circle cx="880" cy="435" r="10" fill="#d1d5db"/>
  <rect x="916" y="255" width="38" height="360" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
  <text x="780" y="360" class="label">far HS bearing</text>
  <text x="875" y="232" class="label">far blue plate</text>

  <!-- Backplate and ball -->
  <rect x="1040" y="300" width="22" height="270" fill="#e5e7eb" stroke="#374151" stroke-width="3"/>
  <circle cx="1005" cy="435" r="43" fill="#fef3c7" stroke="#d97706" stroke-width="4"/>
  <text x="970" y="376" class="label">foam golf ball</text>
  <text x="1012" y="595" class="small">backplate can mount to far plate or a strap</text>
  <text x="980" y="620" class="dim">start gap: 37 mm</text>

  <!-- Standoff dimension -->
  <line x1="349" y1="690" x2="935" y2="690" class="dimline"/>
  <line x1="349" y1="650" x2="349" y2="708" stroke="#111827" stroke-width="2"/>
  <line x1="935" y1="650" x2="935" y2="708" stroke="#111827" stroke-width="2"/>
  <text x="520" y="720" class="dim">plates spaced by #8-32 standoffs / screws, not by the shaft</text>

  <!-- Notes -->
  <rect x="70" y="760" width="1260" height="92" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="95" y="794" class="label">What this means</text>
  <text x="95" y="821" class="small">Lowest drilling risk, but packaging is tight: the motor must be arranged so its shaft enters the bearing-supported cavity without needing the HS shaft to pass through steel.</text>
  <text x="95" y="844" class="small">If the motor stays outside the blue plate and the shaft must pass through that plate, use the drilled-clearance layout instead.</text>
</svg>
