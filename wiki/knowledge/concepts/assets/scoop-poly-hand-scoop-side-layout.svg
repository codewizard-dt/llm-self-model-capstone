<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #4b5563; }
      .label { font: 700 17px Arial, sans-serif; fill: #111827; }
      .small { font: 400 14px Arial, sans-serif; fill: #374151; }
      .dim { font: 700 15px Arial, sans-serif; fill: #111827; }
      .note { font: 700 18px Arial, sans-serif; fill: #dc2626; }
      .arm { fill: #e5e7eb; stroke: #374151; stroke-width: 4; }
      .strap { fill: #dbeafe; stroke: #2563eb; stroke-width: 4; }
      .scoop { fill: #dcfce7; stroke: #047857; stroke-width: 4; }
      .liner { fill: #111827; stroke: #111827; stroke-width: 2; }
      .tie { fill: none; stroke: #7c3aed; stroke-width: 8; stroke-linecap: round; }
      .dimline { fill: none; stroke: #111827; stroke-width: 2; marker-start: url(#arrow); marker-end: url(#arrow); }
      .dash { fill: none; stroke: #6b7280; stroke-width: 2; stroke-dasharray: 8 7; }
    </style>
  </defs>

  <rect x="25" y="25" width="1450" height="850" fill="#fff" stroke="#d1d5db" stroke-width="2"/>
  <text x="70" y="82" class="title">Passive scoop - 3.5 in poly hand scoop side layout</text>
  <text x="70" y="114" class="subtitle">Bully-style rigid poly hand scoop on 8 in strap spine; two clamp stations plus hard anti-slide stop.</text>

  <!-- Ground -->
  <line x1="60" y1="700" x2="1430" y2="700" stroke="#9ca3af" stroke-width="3"/>
  <text x="70" y="730" class="small">floor</text>

  <!-- Robot arm side profile -->
  <polygon points="120,380 640,490 628,535 108,425" class="arm"/>
  <text x="170" y="350" class="label">existing Clawbot arm channel</text>

  <!-- Original claw mount bracket -->
  <rect x="610" y="442" width="95" height="135" rx="8" fill="#bfdbfe" stroke="#2563eb" stroke-width="4"/>
  <circle cx="655" cy="475" r="10" fill="#fff" stroke="#1d4ed8" stroke-width="3"/>
  <circle cx="655" cy="540" r="10" fill="#fff" stroke="#1d4ed8" stroke-width="3"/>
  <text x="570" y="418" class="label">existing claw mount</text>
  <text x="585" y="600" class="small">reuse original #8-32 holes if possible</text>

  <!-- 8 in strap spine -->
  <polygon points="675,490 1058,560 1048,610 665,540" class="strap"/>
  <text x="750" y="470" class="label">8 in Simpson strap spine</text>
  <text x="760" y="642" class="small">steel spine resists twist; holes need not match VEX pitch</text>

  <!-- Rubber liner -->
  <polygon points="800,528 1040,572 1036,596 796,552" class="liner"/>
  <text x="810" y="515" class="small">rubber/friction liner</text>

  <!-- Scoop handle and bowl -->
  <polygon points="890,530 1135,574 1126,620 880,576" fill="#bbf7d0" stroke="#047857" stroke-width="3"/>
  <path d="M1115 550 C1210 540 1325 570 1372 640 C1320 690 1202 706 1106 658 C1088 625 1091 582 1115 550 Z" class="scoop"/>
  <path d="M1130 602 C1215 590 1295 604 1352 646" class="dash"/>
  <text x="1095" y="520" class="label">3.5 in rigid poly hand scoop</text>
  <text x="1160" y="735" class="small">mouth rides near floor, tilted up 10-20 deg</text>

  <!-- Foam golf ball -->
  <circle cx="1285" cy="650" r="43" fill="#fef3c7" stroke="#d97706" stroke-width="4"/>
  <text x="1235" y="600" class="label">foam golf ball</text>

  <!-- Clamp stations -->
  <path d="M820 492 C800 540 803 585 835 620" class="tie"/>
  <path d="M980 520 C960 570 963 612 996 648" class="tie"/>
  <text x="790" y="458" class="label" fill="#7c3aed">two separated clamp stations</text>

  <!-- Anti slide stop -->
  <rect x="860" y="508" width="20" height="92" rx="4" fill="#dc2626"/>
  <text x="835" y="688" class="note">hard anti-slide stop</text>
  <text x="795" y="711" class="small">bolt/screw/zip-tie block behind handle shoulder</text>

  <!-- Dimensions -->
  <line x1="1115" y1="785" x2="1372" y2="785" class="dimline"/>
  <line x1="1115" y1="750" x2="1115" y2="802" stroke="#111827" stroke-width="2"/>
  <line x1="1372" y1="750" x2="1372" y2="802" stroke="#111827" stroke-width="2"/>
  <text x="1178" y="815" class="dim">scoop mouth about 3.5 in wide</text>

  <line x1="665" y1="285" x2="1058" y2="285" class="dimline"/>
  <line x1="665" y1="310" x2="665" y2="270" stroke="#111827" stroke-width="2"/>
  <line x1="1058" y1="310" x2="1058" y2="270" stroke="#111827" stroke-width="2"/>
  <text x="792" y="266" class="dim">8 in strap spine</text>

  <!-- Notes -->
  <rect x="70" y="765" width="820" height="72" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="95" y="795" class="note">Build rule</text>
  <text x="205" y="795" class="small">Do not rely on one tie. Use two clamp stations plus a hard rear stop so floor impacts cannot slide the scoop backward.</text>
  <text x="95" y="818" class="small">If handle is too long, trim with jigsaw and file smooth; keep the bowl low, not pointed upward like a spoon.</text>
</svg>
