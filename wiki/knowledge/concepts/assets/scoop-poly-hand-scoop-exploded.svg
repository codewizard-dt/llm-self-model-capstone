<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="950" viewBox="0 0 1500 950">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #4b5563; }
      .label { font: 700 17px Arial, sans-serif; fill: #111827; }
      .small { font: 400 14px Arial, sans-serif; fill: #374151; }
      .note { font: 700 18px Arial, sans-serif; fill: #dc2626; }
      .mount { fill: #bfdbfe; stroke: #2563eb; stroke-width: 4; }
      .strap { fill: #dbeafe; stroke: #2563eb; stroke-width: 4; }
      .scoop { fill: #dcfce7; stroke: #047857; stroke-width: 4; }
      .tie { fill: none; stroke: #7c3aed; stroke-width: 8; stroke-linecap: round; }
      .arrowline { fill: none; stroke: #111827; stroke-width: 2; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="25" y="25" width="1450" height="900" fill="#fff" stroke="#d1d5db" stroke-width="2"/>
  <text x="70" y="82" class="title">Passive scoop - exploded clamp assembly</text>
  <text x="70" y="114" class="subtitle">Assembly order for a 3.5 in poly hand scoop using the 8 in strap as a rigid adapter spine.</text>

  <!-- A mount -->
  <rect x="80" y="300" width="130" height="250" rx="10" class="mount"/>
  <circle cx="145" cy="360" r="12" fill="#fff" stroke="#1d4ed8" stroke-width="3"/>
  <circle cx="145" cy="490" r="12" fill="#fff" stroke="#1d4ed8" stroke-width="3"/>
  <text x="62" y="270" class="label">A. Clawbot claw mount</text>
  <text x="65" y="585" class="small">existing arm-tip bracket after claw removal</text>

  <!-- B screws -->
  <g fill="#e5e7eb" stroke="#374151" stroke-width="3">
    <rect x="250" y="347" width="120" height="24" rx="8"/>
    <rect x="250" y="477" width="120" height="24" rx="8"/>
    <circle cx="250" cy="359" r="18"/>
    <circle cx="250" cy="489" r="18"/>
  </g>
  <text x="238" y="270" class="label">B. original #8-32 screws</text>
  <text x="238" y="585" class="small">or new screws if strap holes align better</text>

  <!-- C strap -->
  <rect x="420" y="325" width="450" height="105" rx="8" class="strap"/>
  <g fill="#fff" stroke="#2563eb" stroke-width="3">
    <circle cx="475" cy="378" r="13"/>
    <circle cx="550" cy="378" r="13"/>
    <circle cx="625" cy="378" r="13"/>
    <circle cx="700" cy="378" r="13"/>
    <circle cx="775" cy="378" r="13"/>
    <circle cx="840" cy="378" r="13"/>
  </g>
  <text x="520" y="300" class="label">C. 8 in steel strap spine</text>
  <text x="470" y="458" class="small">trim/file only if needed; keep as long as practical for anti-rotation</text>

  <!-- D liner -->
  <rect x="500" y="525" width="330" height="56" rx="8" fill="#111827"/>
  <text x="555" y="505" class="label">D. rubber/friction liner</text>
  <text x="515" y="615" class="small">inner tube, rubber pad, grip tape, or folded zip tie strip</text>

  <!-- E scoop -->
  <rect x="930" y="355" width="270" height="54" rx="11" fill="#bbf7d0" stroke="#047857" stroke-width="3"/>
  <path d="M1185 285 C1305 265 1400 315 1432 392 C1394 470 1305 515 1185 498 C1225 430 1225 355 1185 285 Z" class="scoop"/>
  <text x="995" y="255" class="label">E. 3.5 in poly hand scoop</text>
  <text x="980" y="535" class="small">trim handle only after confirming reach and floor angle</text>

  <!-- F ties -->
  <path d="M925 315 C900 380 905 455 940 515" class="tie"/>
  <path d="M1108 315 C1085 380 1090 455 1125 515" class="tie"/>
  <text x="930" y="625" class="label" fill="#7c3aed">F. two zip ties / Velcro clamp stations</text>

  <!-- G stop -->
  <rect x="905" y="338" width="22" height="92" rx="5" fill="#dc2626"/>
  <text x="828" y="705" class="note">G. hard anti-slide stop</text>
  <text x="828" y="730" class="small">bolt, screw, nut stack, or zip-tie block behind handle shoulder</text>

  <!-- Assembly arrows -->
  <path d="M215 425 H392" class="arrowline"/>
  <path d="M870 382 H920" class="arrowline"/>
  <path d="M650 525 V455" class="arrowline"/>
  <text x="285" y="418" class="small">bolt/lash spine to mount</text>
  <text x="705" y="500" class="small">liner under handle</text>
  <text x="875" y="360" class="small">clamp scoop to spine</text>

  <!-- Test box -->
  <rect x="70" y="785" width="1360" height="96" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="95" y="820" class="note">Acceptance test</text>
  <text x="240" y="820" class="small">With the arm lowered, the scoop lip should touch the floor before the strap or mount does. Push the scoop into the foam golf ball by hand.</text>
  <text x="95" y="845" class="small">Pass: ball rolls into bowl, scoop does not twist, handle does not slide backward, and no sharp metal/plastic burrs remain.</text>
  <text x="95" y="868" class="small">Fail: add liner, tighten second clamp, move hard stop closer to handle shoulder, or trim handle to reduce leverage.</text>
</svg>
