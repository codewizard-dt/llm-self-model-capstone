<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Flywheel arm-extension exploded stack</title>
  <desc id="desc">Exploded assembly order for the arm-extension flywheel: existing arm channels, red Home Depot strap extensions, blue VEX side plates, motor, flywheel, optional far-side bearing, and backplate.</desc>
  <defs>
    <style>
      .arm{fill:#e5e7eb;stroke:#374151;stroke-width:4;stroke-linejoin:round}
      .red{fill:#fee2e2;stroke:#dc2626;stroke-width:5;stroke-linejoin:round}
      .blue{fill:#dbeafe;stroke:#2563eb;stroke-width:4;stroke-linejoin:round}
      .wheel{fill:#ecfdf5;stroke:#047857;stroke-width:4}
      .ball{fill:#fff7ed;stroke:#ea580c;stroke-width:4}
      .motor{fill:#eff6ff;stroke:#2563eb;stroke-width:4}
      .bearing{fill:#fff;stroke:#2563eb;stroke-width:3}
      .backplate{fill:#e5e7eb;stroke:#4b5563;stroke-width:3}
      .part{fill:none;stroke:#111827;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
      .dash{fill:none;stroke:#6b7280;stroke-width:2;stroke-dasharray:9 7}
      .label{font:18px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}
      .small{font:15px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#374151}
    </style>
  </defs>
  <rect x="20" y="20" width="1160" height="780" fill="#fff" stroke="#d1d5db" stroke-width="2"/>
  <text x="50" y="62" class="label" style="font-size:28px;font-weight:700">Exploded stack - current arm-extension launcher</text>
  <text x="50" y="92" class="small">Assembly order from existing arm outward to racquetball launcher box.</text>
  <line x1="75" y1="140" x2="1110" y2="140" class="dash"/>
  <path d="M1110 140 l-24 -10 l8 10 l-8 10 z" fill="#6b7280"/>

  <!-- existing arm -->
  <polygon points="70,345 260,425 245,462 55,382" class="arm"/>
  <polygon points="70,525 260,465 275,502 85,562" class="arm"/>
  <text x="55" y="310" class="label">1. existing arm channels</text>

  <!-- red extensions -->
  <polygon points="310,300 520,350 512,388 302,338" class="red"/>
  <polygon points="310,565 520,515 528,553 318,603" class="red"/>
  <text x="302" y="265" class="label" fill="#dc2626">2. red strap extensions</text>
  <text x="302" y="630" class="small">bolt flat along arm, extend forward past wheels</text>

  <!-- blue plates -->
  <rect x="580" y="250" width="90" height="380" rx="8" class="blue"/>
  <rect x="720" y="250" width="90" height="380" rx="8" class="blue" opacity="0.72"/>
  <text x="570" y="220" class="label" fill="#2563eb">3. blue VEX launcher side plates</text>
  <text x="570" y="660" class="small">inside spacing target 65 mm for racquetball</text>

  <!-- motor/wheel/backplate -->
  <rect x="850" y="350" width="120" height="88" rx="12" class="motor"/>
  <text x="840" y="320" class="label">4. motor outside plate</text>
  <circle cx="1015" cy="395" r="76" class="wheel"/>
  <circle cx="1015" cy="395" r="26" fill="#fff" stroke="#047857" stroke-width="3"/>
  <circle cx="1015" cy="395" r="36" class="bearing"/>
  <text x="962" y="500" class="small">5. wheel inside blue box</text>
  <rect x="1035" y="555" width="50" height="160" rx="8" class="backplate"/>
  <circle cx="990" cy="630" r="38" class="ball"/>
  <text x="912" y="745" class="small">6. backplate/chute tuned to 51 mm from wheel rim</text>

  <!-- optional far support -->
  <circle cx="760" cy="395" r="34" class="bearing"/>
  <text x="700" y="705" class="small">optional far-side bearing only if shaft length allows</text>
</svg>
