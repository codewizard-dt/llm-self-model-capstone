<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Fixed-arm flywheel 5x10 exploded stack from rear tower</title>
  <desc id="desc">Exploded stack showing the photo-accurate rear tower and diagonal arm channels, then adapter plates, 5x5 gussets, 5x10 side plates, standoffs, bearings, shaft, wheel, collars, and motor.</desc>
  <defs>
    <style>
      .metal{fill:#f3f4f6;stroke:#111827;stroke-width:3;stroke-linejoin:round}
      .channel{fill:#e5e7eb;stroke:#374151;stroke-width:4;stroke-linejoin:round}
      .gear{fill:#fee2e2;stroke:#b91c1c;stroke-width:3}
      .adapter{fill:#eff6ff;stroke:#2563eb;stroke-width:3;stroke-linejoin:round}
      .gusset{fill:#ede9fe;stroke:#7c3aed;stroke-width:3;stroke-linejoin:round}
      .wheel{fill:#ecfdf5;stroke:#047857;stroke-width:3}
      .bearing{fill:#fff;stroke:#2563eb;stroke-width:3}
      .collar{fill:#fffbeb;stroke:#b45309;stroke-width:3}
      .motor{fill:#eff6ff;stroke:#2563eb;stroke-width:3}
      .part{fill:none;stroke:#111827;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
      .dash{fill:none;stroke:#6b7280;stroke-width:2;stroke-dasharray:9 7}
      .label{font:18px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}
      .small{font:15px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#374151}
    </style>
  </defs>
  <rect x="20" y="20" width="1160" height="780" fill="#fff" stroke="#d1d5db" stroke-width="2"/>
  <text x="50" y="62" class="label" style="font-size:28px;font-weight:700">Fixed-arm cassette - exploded from rear tower</text>
  <text x="50" y="92" class="small">Exploded view references the actual side profile: diagonal arm channels terminate at the rear tower/gear area, then the cassette stacks outward.</text>

  <line x1="90" y1="138" x2="1090" y2="138" class="dash"/>
  <path d="M1090 138 l-22 -10 l8 10 l-8 10 z" fill="#6b7280"/>
  <text x="465" y="126" class="small">collapse left-to-right outward from the fixed rear tower</text>

  <!-- fixed rear tower and diagonal arms from photo -->
  <rect x="70" y="285" width="76" height="350" rx="8" class="metal"/>
  <circle cx="146" cy="445" r="63" class="gear"/>
  <polygon points="20,335 150,390 142,425 12,370" class="channel"/>
  <polygon points="20,520 150,465 160,500 30,555" class="channel"/>
  <line x1="38" y1="565" x2="142" y2="610" class="part"/>
  <text x="48" y="250" class="label">rear tower + two diagonal arm channels</text>
  <text x="38" y="665" class="small">braced before arm motor is disabled</text>

  <!-- adapter clamp -->
  <rect x="245" y="290" width="82" height="300" rx="8" class="adapter"/>
  <rect x="370" y="290" width="82" height="300" rx="8" class="adapter"/>
  <line x1="150" y1="378" x2="370" y2="378" class="part"/>
  <line x1="150" y1="505" x2="370" y2="505" class="part"/>
  <text x="225" y="260" class="label">inner / outer adapter plates</text>
  <text x="214" y="625" class="small">#8-32 screws reuse existing rear tower and arm holes</text>

  <!-- gussets and side plate -->
  <polygon points="500,300 600,360 512,455" class="gusset"/>
  <polygon points="500,475 600,535 512,630" class="gusset"/>
  <text x="488" y="270" class="label">5x5 gussets</text>
  <rect x="635" y="245" width="95" height="390" rx="8" class="metal"/>
  <circle cx="682" cy="440" r="34" class="bearing"/>
  <text x="610" y="220" class="label">near 5x10 cassette side</text>

  <!-- spacers -->
  <rect x="765" y="280" width="70" height="28" rx="14" class="metal"/>
  <rect x="765" y="575" width="70" height="28" rx="14" class="metal"/>
  <text x="755" y="250" class="label">standoffs / spacers</text>

  <!-- shaft assembly -->
  <line x1="855" y1="440" x2="990" y2="440" class="part"/>
  <rect x="865" y="413" width="28" height="54" rx="8" class="collar"/>
  <circle cx="925" cy="440" r="70" class="wheel"/>
  <circle cx="925" cy="440" r="24" fill="#fff" stroke="#047857" stroke-width="3"/>
  <rect x="960" y="413" width="28" height="54" rx="8" class="collar"/>
  <text x="840" y="340" class="label">HS shaft, collars, 60A wheel</text>

  <!-- far side plate and motor -->
  <rect x="1020" y="245" width="95" height="390" rx="8" class="metal"/>
  <circle cx="1068" cy="440" r="34" class="bearing"/>
  <rect x="1038" y="660" width="105" height="64" rx="12" class="motor"/>
  <line x1="1068" y1="440" x2="1090" y2="660" class="dash"/>
  <text x="995" y="220" class="label">far 5x10 side + motor</text>

  <rect x="62" y="728" width="760" height="42" fill="#f9fafb" stroke="#111827" stroke-width="2"/>
  <text x="82" y="755" class="small">This stack starts at the real rear tower/arm joint visible in the side photo, not at an abstract vertical mast.</text>
</svg>
