apiVersion: ai-sdd/v1
kind: Schema
metadata: { name: parts-catalog, version: 2 }
spec:
  # FROZEN CONTRACT — Parts Catalog Grammar. Narrowed 2026-06-24 (PR #16 post-merge review):
  # motor_allocation is now effector-encoded, three single-value axes (arm_position,
  # arm_gear_ratio, wheel_config) were removed, cartridge dropped 100rpm. Requirement-level
  # freeze; canonical runtime copy is parts_catalog.json + a pydantic-v2 model in `contracts/`
  # (ADR-06/14). The finite typed design vocabulary (4 valid configs under F3's rule set,
  # Starter Kit only). Validated continuously by parts-catalog.structure against
  # examples/parts-catalog.example.json.
  handle: file
  format: yaml
  scope: shared
  fields:
    motor_allocation:
      type: list
      required: true
      invariants: [{ nonEmpty: true }, { all: { nonEmpty: true } }]
    end_effector:
      type: list
      required: true
      invariants: [{ nonEmpty: true }, { all: { nonEmpty: true } }]
    cartridge:
      type: list
      required: true
      invariants: [{ nonEmpty: true }, { all: { nonEmpty: true } }]
