apiVersion: ai-sdd/v1
kind: Schema
metadata: { name: review, version: 1 }
spec:
  handle: file
  format: yaml
  scope: internal
  # The reviewer's artifact. Its field invariants ENCODE the accept/reject decision, so the Tier-1
  # structural check IS the blocking verdict gate: every items[].verdict must be `pass` AND the
  # overall verdict must be `approve`, else the gate fails and the engine routes rework to the
  # producer named in `rework[].target`. The reviewer is the judge; no separate judge-runner.
  fields:
    items:
      type: list
      required: true
      invariants:
        - { nonEmpty: true }
        - { all: { field: id, nonEmpty: true } }
        - { all: { field: verdict, matches: "^(pass|fail)$" } }
        - { all: { field: verdict, eq: pass } }
    verdict:
      type: string
      required: true
      invariants:
        - { matches: "^(approve|reject)$" }
        - { eq: approve }
    rework:
      type: list
