apiVersion: ai-sdd/v1
kind: Worker
metadata: { name: milestone-gate }
spec:
  # Provided for the m1–m5 milestones declared in MASTER_REQUIREMENTS → Milestones, wired by the
  # program plan (ai-sdd-plan-program), not by this per-slice pattern. MANUAL variant: a human
  # validates and records a validation-result.v1; the structural check enforces `outcome == pass`.
  #
  # All milestones (m1–m6) are MANUAL human gates per MASTER_REQUIREMENTS → Milestones (critical merge
  # checkpoints). To automate one later, swap that node's kind/checks:
  # set `workerKind: transform` with a skill that runs the harness + a deterministic check, e.g.
  #     command: "make demo"          # m2-loop-closes-synthetic
  #     command: "make validate"      # m1-contracts-frozen
  # gated on exit code. Inputs/outputs are unchanged.
  workerKind: human
  produces: [{ schema: validation-result.v1 }]
  task: { skill: validate-milestone }
  checks: [validation-result.structure]
