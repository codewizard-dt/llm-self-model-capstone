      `SelfModel.model_validate_json`, collect failures as `name: error` (no lineno)
      on stderr, return 1 on any failure. NEGATIVE TEST verified independently: I
      created `contracts/fixtures/self_model_bad.json` (empty reasoning + empty
      objects); `make validate` printed `self_model_bad.json: 1 validation error for
      SelfModel / reasoning String should have at least 1 character` on stderr and
      exited non-zero (main() returns 1; make wraps to RC 2). After DELETING the temp
      file, `make validate` returned to exit 0. The `*.jsonl → ContractLine` path's
      `name:lineno: error` format and OK line are byte-for-byte unchanged (diff is
      purely additive); both gen fixtures + the existing session_example.jsonl all
      validate on the same run.
  - id: AC2
    verdict: pass
    notes: >-
      fixtures-conform-to-frozen-seed-schema — independently ran
      `ai-sdd check .ai-sdd/schemas/self-model.schema.yaml <fixture>` for BOTH
      fixtures: gen0 RC 0 ("✓ satisfies self-model.v1"), gen1 RC 0. schema_version
