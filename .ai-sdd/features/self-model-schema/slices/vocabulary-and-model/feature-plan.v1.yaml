apiVersion: ai-sdd/v1
kind: FeaturePlan
metadata:
  feature: self-model-schema
  slice: vocabulary-and-model
  stack: contracts

summary: >-
  Additively extend the landed F1 `contracts` package with the Self-Model Schema (F2),
  WITHOUT regressing F1. Create `contracts/src/contracts/vocabulary.py` — one `StrEnum`
  per config axis (`MotorAllocation`, `ArmPosition`, `EndEffector`, `WheelConfig`,
  `ArmGearRatio`, `Cartridge`), value sets seeded verbatim from MASTER_REQUIREMENTS →
  Parts Catalog Grammar; this is the single shared atom F3 (parts-catalog-grammar) will
  later import (D1). Create `contracts/src/contracts/self_model.py` with the `SelfModel`
  pydantic v2 model (`extra="allow"`) and its sub-models: `SelfModelConfig` (six axes
  typed against the `vocabulary` enums, `extra="forbid"`), `StructuralLayer` with
  `Part{id,type}` + `Connection{source,target,kind}` (edge fields `source`/`target`,
  NOT `from`/`to`; `extra="allow"`; empty lists allowed), `CapabilityLayer` (four float
  fields, `extra="forbid"`), the flexible `predictive`/`gap_model` dicts (free task-string
  keys), the required `reasoning: str` (`min_length=1`), and a `model_validator` enforcing
  the generation lineage rule (gen 0 ⇒ parent None; gen > 0 ⇒ parent int < generation).
  Reuse F1's `StrictModel` base (defined in `motor_telemetry.py`) for the strict sub-models.
  Extend `contracts/__init__.py` to re-export `SelfModel` + the vocabulary enums while
  KEEPING every F1 export. Extend `contracts/schema.py` + the Makefile `schema` target so
  `make schema` is the SINGLE generator that regenerates BOTH `schemas/contract_line.json`
  (byte-stable) and `schemas/self_model.json` (config enums rendered as JSON-Schema `enum`
  arrays) from the pydantic models, and add the D8 freshness gate (`make schema` then
  `git diff --exit-code schemas/`). Generate + commit `contracts/schemas/self_model.json`.
  Add `contracts/tests/test_self_model.py` covering the full validator matrix. Fixtures and
  the `validate` extension are OUT — deferred to the next slice `fixtures-and-gates` (D7).

scope:
  in:
    - "contracts/src/contracts/vocabulary.py — NEW. One `StrEnum` per config axis with values seeded verbatim from MASTER_REQUIREMENTS Parts Catalog Grammar: MotorAllocation(`2drive+1arm+1claw`,`2drive+2free`,`4drive`,`3drive+1manip`), ArmPosition(`front`,`rear`,`side`,`absent`), EndEffector(`claw_grasper`,`bare_arm`,`none`), WheelConfig(`front_omni+rear_standard`), ArmGearRatio(`7:1`,`1:1`), Cartridge(`200rpm`). Single source of truth for F2+F3 (D1); not duplicated anywhere else."
    - "contracts/src/contracts/self_model.py — NEW. `SelfModel` (pydantic v2, `extra=\"allow\"`) reusing F1's `StrictModel` base; sub-models `SelfModelConfig` (six snake_case axes — motor_allocation/arm_position/end_effector/wheel_config/arm_gear_ratio/cartridge — typed against the vocabulary enums, `extra=\"forbid\"`), `StructuralLayer` (parts:list[Part], connections:list[Connection]), `Part{id:str,type:str}` + `Connection{source:str,target:str,kind:str}` with `extra=\"allow\"` and empty lists allowed, `CapabilityLayer` (reach_mm/max_grip_force_N/max_pull_force_N/com_height_mm floats default 0, `extra=\"forbid\"`). Top-level fields: schema_version:Literal[\"1.0\"]=\"1.0\", generation:int (ge=0), parent_generation:int|None, predictive:dict[str,dict[str,float|bool|str]], gap_model:dict[str,dict[str,float]], reasoning:str (min_length=1). A `model_validator(mode=\"after\")` enforces the lineage rule."
    - "contracts/src/contracts/__init__.py — CHANGE (additive). Re-export `SelfModel` and the six vocabulary enums; KEEP all existing F1 exports (ContractLine, VisionBlock, AprilTagPose, MotorApiSample, MotorApiValues, ContractSource, motor_sample_from_vexcode, motor_sample_from_pros, vexcode_motor_source_api) and append the new names to `__all__`."
    - "contracts/src/contracts/schema.py — CHANGE. Make `schema` the single generator that writes BOTH `schemas/contract_line.json` (output byte-identical to the F1 committed file) and `schemas/self_model.json` (from SelfModel.model_json_schema(), config enums as JSON-Schema `enum` arrays). Mechanism is the architect's choice (refactor to write both files, or keep stdout-per-model and drive both from the Makefile) provided contract_line.json stays byte-stable (D8)."
    - "contracts/Makefile — CHANGE. `schema` target regenerates BOTH json files. Add the D8 freshness gate (e.g. a `schema-check` recipe, or fold into `schema`/`validate`) that runs `make schema` then `git diff --exit-code schemas/`, asserting committed == generated."
    - "contracts/schemas/self_model.json — NEW. Generated by `make schema`, committed. Non-empty; config enums rendered as JSON-Schema `enum` arrays."
    - "contracts/tests/test_self_model.py — NEW. Full validator matrix (see acceptance AC6)."
  out:
    - "contracts/fixtures/self_model_gen0.json and self_model_gen1.json — DEFERRED to the next slice `fixtures-and-gates` (D6, D7). No fixture authoring in this slice."
    - "contracts/src/contracts/validate.py self-model dispatch — DEFERRED to `fixtures-and-gates`; this slice does not touch validate.py."
    - "Any change to F1's frozen ContractLine / MotorApiSample / MotorApiValues / VisionBlock / AprilTagPose / ContractSource models or to the `contract_line.json` OUTPUT — F2 is strictly additive and contract_line.json must stay byte-stable (D5, D8)."
    - "F3 parts_catalog.json and valid-combination / buildability rules — F2 ships only the per-axis enum vocabulary F3 imports (D1)."
    - "A shared residual-key enum for gap_model — explicitly rejected (D5); gap_model[task] reuses F1's frozen `gap` residual keys by convention only, never changing F1."
    - "`make demo` — an m2-milestone concern, never a per-slice gate."
    - "Authoring/revision logic (F8), critic logic (F9), gap computation (F10), diff rendering (F11), adapter protocols (F4), control grammar (F19)."

acceptance:
  - id: AC1
    description: >-
      sync-clean — `make sync` (which runs `uv sync`) exits 0. The new modules import
      cleanly and add no new third-party dependency (pydantic v2 already declared by F1).
  - id: AC2
    description: >-
      lint-clean — `make lint` exits 0: `ruff check src/ tests/` and
      `ruff format --check src/ tests/` pass over the new vocabulary.py, self_model.py,
      changed __init__.py / schema.py, and test_self_model.py with no violations.
  - id: AC3
    description: >-
      schema-generates-and-fresh — `make schema` exits 0 and is the single generator
      regenerating BOTH json files from the pydantic models. `schemas/self_model.json`
      is non-empty and renders each config axis enum as a JSON-Schema `enum` array;
      `schemas/contract_line.json` is byte-identical to the F1-committed file; the D8
      freshness gate (`make schema` then `git diff --exit-code schemas/`) passes —
      committed == generated. `schemas/self_model.json` is committed.
  - id: AC4
    description: >-
      public-import-works — after `make sync`, `from contracts import SelfModel` and
      `from contracts import MotorAllocation, ArmPosition, EndEffector, WheelConfig,
      ArmGearRatio, Cartridge` (the vocabulary enums) succeed under `uv run python`,
      and every F1 export remains importable from `contracts` (no regression to the
      public API).
  - id: AC5
    description: >-
      lineage-and-vocabulary-locked — `SelfModel` enforces: schema_version locked to
      Literal["1.0"]; generation >= 0; parent_generation is None at gen 0 and an int
      strictly less than `generation` for gen > 0; SelfModelConfig's six axes are typed
      against the shared `contracts.vocabulary` enums by import-identity (NOT a copy);
      config axis values outside the enum (e.g. `cartridge: "999rpm"`) are rejected.
  - id: AC6
    description: >-
      test-matrix-green — `make test` exits 0, with test_self_model.py covering the full
      validator matrix: Gen-0 doc with `parent_generation: 0` raises ValidationError;
      Gen-1-shaped doc with `parent_generation: null` raises ValidationError;
      `parent_generation >= generation` raises ValidationError; empty `reasoning` raises
      ValidationError; missing `config` / `capability` / `generation` each raise
      ValidationError; out-of-vocabulary config value raises ValidationError;
      SelfModelConfig field annotations resolve to the shared `contracts.vocabulary`
      enums via import-identity; `predictive` and `gap_model` accept an arbitrary task
      key; an extra field on a strict sub-model (SelfModelConfig / CapabilityLayer)
      raises ValidationError.
  - id: AC7
    description: >-
      no-f1-regression — F1's existing test suite still passes under `make test`, and
      F1's frozen models plus the `contract_line.json` output are untouched (strictly
      additive change; contract_line.json byte-stable by the AC3 freshness gate).

decisions:
  - id: PD1
    title: Config validated against a shared per-axis StrEnum vocabulary (single source for F2+F3)
    decision: >-
      Create `contracts/vocabulary.py` with one `StrEnum` per config axis, values seeded
      verbatim from the Parts Catalog Grammar. SelfModelConfig types its six snake_case
      axes against these enums and enforces per-axis legality only (`extra="forbid"`).
      Combination-legality and `parts_catalog.json` are F3 + critic, OUT here. The enum
      module is the single source of truth F3 imports — never duplicated.
    grounds: "requirements D1; slice brief 'contracts/vocabulary.py'; MASTER_REQUIREMENTS → Constraints → Frozen Contracts → Parts Catalog Grammar (lines 316-325); contracts convention Boundary rule 'No schema is defined outside contracts'"
    status: closed
  - id: PD2
    title: predictive / gap_model are flexible dicts keyed by free task string
    decision: >-
      Type `predictive: dict[str, dict[str, float | bool | str]]` and
      `gap_model: dict[str, dict[str, float]]` — free task-string keys, flexible inner
      dicts. No per-task sub-models (mirrors F1 D2's typed-core / flexible-edges pattern,
      where ContractLine.predicted and .gap are likewise free dicts).
    grounds: "requirements D2; slice brief self_model.py field list; F1 precedent in contracts/contract_line.py (predicted/gap dict typing)"
    status: closed
  - id: PD3
    title: capability is strict — exactly the four contract fields
    decision: >-
      `CapabilityLayer` has only reach_mm, max_grip_force_N, max_pull_force_N,
      com_height_mm (float, default 0) and is strict (`extra="forbid"`). Any extra field
      is a ValidationError.
    grounds: "requirements D3; slice brief CapabilityLayer; MASTER_REQUIREMENTS Self-Model Schema example (line 309)"
    status: closed
  - id: PD4
    title: structural is lightweight-typed with source/target edges and extra="allow"
    decision: >-
      `StructuralLayer` has parts:list[Part] and connections:list[Connection];
      `Part{id:str, type:str}` and `Connection{source:str, target:str, kind:str}` use
      `extra="allow"`; empty lists are allowed. Edge endpoints are named `source`/`target`
      (NOT `from`/`to`) to avoid the Python `from` keyword. structural deliberately does
      NOT enforce that parts are real catalog parts (that is F3 + critic, OUT here).
    grounds: "requirements D4; slice brief StructuralLayer/Part/Connection; MASTER_REQUIREMENTS Self-Model Schema example (line 308, empty parts/connections)"
    status: closed
  - id: PD5
    title: gap_model keeps its name and reuses F1's frozen gap residual keys by convention; F1 untouched
    decision: >-
      Keep the `gap_model` name distinct from F1's telemetry `gap`. The invariant is that
      `gap_model[task]` reuses F1's frozen `gap` residual keys (e.g. force_error_N,
      duration_error_s for grab), but this is a convention enforced in fixtures (next
      slice), NOT a shared residual-key enum — a shared enum would break F1 D2's flexible
      `gap` dict. F1's ContractLine and contract_line.json are NOT modified.
    grounds: "requirements D5; MASTER_REQUIREMENTS Task-Telemetry example gap keys (line 296) and Self-Model gap_model (line 311); F1 frozen — contracts/contract_line.py unchanged"
    status: closed
  - id: PD6
    title: Generation lineage enforced by a single model_validator
    decision: >-
      A `model_validator(mode="after")` on SelfModel enforces: generation == 0 ⇒
      parent_generation is None; generation > 0 ⇒ parent_generation is an int strictly
      less than generation. generation also carries `ge=0`. schema_version is locked to
      `Literal["1.0"]` (default "1.0"). This mirrors F1's after-validator style in
      MotorApiSample.require_full_vexcode_motor_api.
    grounds: "requirements In-scope (SelfModel field list) + Constraints (schema_version locked); slice brief model_validator bullet; F1 precedent MotorApiSample.model_validator(mode=after)"
    status: closed
  - id: PD7
    title: make schema is the single generator; D8 freshness gate makes committed == generated
    decision: >-
      Extend schema.py + the Makefile `schema` target so `make schema` regenerates BOTH
      `schemas/contract_line.json` and `schemas/self_model.json` from the pydantic models
      (single source of truth). The committed json files are reviewable/diffable. Add a
      freshness gate that runs `make schema` then `git diff --exit-code schemas/`, so any
      drift fails. The contract_line.json OUTPUT must stay byte-stable — the new emit must
      reproduce F1's existing committed file exactly (json.dumps(..., indent=2,
      sort_keys=True) as in F1's schema.py). Emit mechanism is the architect's choice
      provided byte-stability holds.
    grounds: "requirements D8 and Acceptance #3; slice brief 'make schema + freeze gate (D8)'; MASTER_REQUIREMENTS ADR-06 (pydantic v2 + JSON-Schema export); F1 contracts/schema.py emit conventions (indent=2, sort_keys=True)"
    status: closed
  - id: PD8
    title: Reuse F1's StrictModel base; strictly additive package change
    decision: >-
      Import and reuse F1's `StrictModel` (defined in contracts/motor_telemetry.py,
      `ConfigDict(extra="forbid", strict=True)`) for SelfModelConfig and CapabilityLayer
      rather than redefining a base. Extend __init__.py additively, preserving every F1
      export and the existing import structure. No new dependency is added (pydantic v2
      already present). No F1 source file is modified.
    grounds: "requirements Constraints ('reuse F1's StrictModel base') + 'Additive only'; slice brief; contracts convention Model/entity row (pydantic v2); F1 contracts/motor_telemetry.py StrictModel definition"
    status: closed
  - id: PD9
    title: Tooling locked to Python 3.12 / uv / ruff / pydantic v2; build entry make sync
    decision: >-
      Python 3.12, uv for deps/venv, ruff for lint+format, pydantic v2 `ConfigDict`
      style and `model_json_schema()` for export. Build/reviewer entry is `make sync`
      (F1 convention) → `uv sync`. No pip/poetry/black/flake8.
    grounds: "MASTER_REQUIREMENTS ADR-05 (Python), ADR-06 (pydantic v2 + JSON-Schema export), ADR-15 (uv), ADR-16 (ruff); requirements Constraints; contracts convention Build/Lint/Language rows; F1 Makefile (`make sync`)"
    status: closed
  - id: PD10
    title: Fixtures and validate-extension are OUT — two-slice decomposition
    decision: >-
      This slice ships the vocabulary atom, the SelfModel models + validators, the schema
      emit + freeze gate, and the unit tests only. The Gen-0/Gen-1 fixtures and the
      validate.py self-model dispatch land in the next slice `fixtures-and-gates`. Because
      no new fixtures are introduced here, `make validate` keeps passing on F1's existing
      path unchanged; it is therefore not a NEW gate this slice (but listed in `tests`
      since the F1 path must stay green). `make demo` is never a per-slice gate.
    grounds: "requirements D7 (two-slice decomposition); slice brief 'No fixtures yet — those are the next slice'; plan-feature SKILL ('make demo is an m2-milestone concern, not a per-slice gate')"
    status: closed

files:
  - "contracts/src/contracts/vocabulary.py"
  - "contracts/src/contracts/self_model.py"
  - "contracts/src/contracts/__init__.py"
  - "contracts/src/contracts/schema.py"
  - "contracts/Makefile"
  - "contracts/schemas/self_model.json"
  - "contracts/tests/test_self_model.py"

tests:
  - "make sync"
  - "make lint"
  - "make test"
  - "make schema"
  - "make validate"
