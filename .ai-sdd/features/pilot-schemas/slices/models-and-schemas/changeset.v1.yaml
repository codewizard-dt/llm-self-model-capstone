    - contracts/schemas/pilot_skill_command.json
    - contracts/schemas/pilot_observation.json
    - contracts/schemas/pilot_assertion.json
    - contracts/schemas/pilot_decision.json
    - contracts/schemas/pilot_trace_record.json
    - contracts/tests/test_pilot_schemas.py
  deleted: []

