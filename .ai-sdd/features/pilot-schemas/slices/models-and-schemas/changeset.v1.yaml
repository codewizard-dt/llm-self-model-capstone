apiVersion: ai-sdd/v1
kind: Changeset
metadata:
  feature: pilot-schemas
  slice: models-and-schemas
  stack: contracts

summary: >-
  Added the contract-owned pilot schema surface for the online control loop:
  closed pilot skill names, typed bounded skill command variants, normalized
  observation snapshots, assertion results, bounded pilot decisions, appendable
  discriminated trace records, additive public exports, schema generator entries,
  generated JSON Schema files, and focused contract tests for valid and rejected
  pilot payloads.

satisfies:
  - ACC-PILOT-MODELS
  - ACC-CLOSED-SKILLS
  - ACC-TYPED-BOUNDED-COMMANDS
  - ACC-OBSERVATION-SNAPSHOT
  - ACC-ASSERTION-RESULTS
  - ACC-BOUNDED-DECISIONS
  - ACC-TRACE-UNION
  - ACC-SCHEMA-EXPORTS
  - ACC-PUBLIC-EXPORTS
  - ACC-REGRESSION-GATES

