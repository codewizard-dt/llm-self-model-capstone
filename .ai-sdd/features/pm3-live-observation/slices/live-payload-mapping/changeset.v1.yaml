summary: >-
  Added a ROS-free pilot live-observation mapper that normalizes agent-scene and fallback JSON-style
  payloads into ObservationCache, delegates final PilotObservation construction to the existing
  snapshot builder, exports the new API additively, preserves explicit zero localization and bridge
  heartbeat ages, and covers pose aliases, fallback sources, stale/unknown evidence, objective
  validation, builder delegation, and ROS-free imports with deterministic tests.
