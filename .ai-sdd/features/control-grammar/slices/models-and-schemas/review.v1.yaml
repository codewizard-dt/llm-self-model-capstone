  - id: acc-test-envelope-v
    verdict: pass
    notes: "`test_v_must_be_one` checks v=2 on a cmd line, v=0 on heartbeat, and v=2 on AckLine — all raise ValidationError. `v: Literal[1] = 1` locked on every wire model (D8)."
  - id: acc-test-envelope-extras
    verdict: pass
    notes: "`test_extras_forbidden_on_every_model` exercises extras on envelope-level, heartbeat, drive body, AND AckLine — all reject. `ConfigDict(extra='forbid')` set on ControlEnvelope and AckLine; StrictModel base inherited by command subclasses."
  - id: acc-test-envelope-seq
    verdict: pass
    notes: "`test_seq_out_of_range_rejected` covers [-1, 2**32, 2**32+1]; `test_seq_boundaries_accepted` confirms seq=0 and seq=2**32-1 accepted. D5 enforced via `Field(ge=0, lt=2**32)`."
  - id: acc-test-ack-ok-with-fault
    verdict: pass
    notes: "`test_ack_ok_with_fault_rejected` passes — AckLine(state='ok', fault='ttl_expired') raises ValidationError. The `@model_validator(mode='after')` in AckLine enforces `fault is None iff state == 'ok'`."
  - id: acc-test-ack-rejected-without-fault
    verdict: pass
    notes: "`test_ack_rejected_without_fault_rejected` passes with both implicit-null (no fault key) and explicit fault=None cases — both raise ValidationError. Model validator's 'rejected requires non-null fault' branch fires."
  - id: acc-test-ack-stale-with-fault
    verdict: pass
    notes: "`test_ack_stale_with_fault_accepted` passes — AckLine(state='stale', fault='ttl_expired') validates and ack.fault is FaultCode.TTL_EXPIRED. D6 — stale accepts either."
  - id: acc-test-ack-ok-no-fault
    verdict: pass
    notes: "`test_ack_ok_no_fault_accepted` passes — AckLine(state='ok', fault=None) validates cleanly. Sibling case `test_ack_rejected_with_fault_accepted` also confirms rejected+fault works."
  - id: acc-test-clamp-identity
    verdict: pass
    notes: "`test_clamp_constants_bit_for_bit` passes. Independently imported each from `contracts` (top-level) and confirmed: MAX_LINEAR=0.35, MAX_OMEGA=0.6, MAX_FLYWHEEL_RPM=3600.0, ARM_DEG_MIN=0.0, ARM_DEG_MAX=360.0, TTL_MS_MAX=1000 — exact values per D10/C1."
  - id: acc-test-faultcode-closed
