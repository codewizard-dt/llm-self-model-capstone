    verdict: pass
    notes: "`test_drive_vx_out_of_range_rejected` parametrized over [MAX_LINEAR+1e-6, -MAX_LINEAR-1e-6, 1.0, -1.0] — all 4 reject. D11 (reject not clamp) honored; `Field(ge=-MAX_LINEAR, le=MAX_LINEAR)` on DriveCommand.vx."
  - id: acc-test-vy-locked
    verdict: pass
    notes: "`test_drive_vy_must_be_zero` parametrized over [0.01, -0.01, 0.1, -0.1] — all 4 reject. Independently probed vy=0.01 and vy=-0.01 directly: both raise ValidationError; vy=0.0 explicit and vy default (omitted) both accept. D12 enforced via `Field(default=0.0, ge=0.0, le=0.0)`."
  - id: acc-test-range-omega
    verdict: pass
    notes: "Both `test_drive_omega_out_of_range_rejected` and `test_turn_omega_out_of_range_rejected` pass — each parametrized over [MAX_OMEGA+1e-6, -MAX_OMEGA-1e-6]; both verbs use `Field(ge=-MAX_OMEGA, le=MAX_OMEGA)`."
  - id: acc-test-range-arm
    verdict: pass
    notes: "`test_arm_deg_out_of_range_rejected` parametrized over [-1e-6, 360.000001, -1.0, 361.0] — all 4 reject. ArmCommand.deg uses `Field(ge=ARM_DEG_MIN, le=ARM_DEG_MAX)`."
  - id: acc-test-range-flywheel
    verdict: pass
    notes: "`test_flywheel_rpm_out_of_range_rejected` parametrized over [-0.1, 3600.1, -1.0] — all 3 reject. FlywheelCommand.rpm uses `Field(ge=0.0, le=MAX_FLYWHEEL_RPM)`."
  - id: acc-test-range-ttl
