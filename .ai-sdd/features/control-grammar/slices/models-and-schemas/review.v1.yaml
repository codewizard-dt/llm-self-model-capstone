    notes: "`test_unknown_cmd_rejected` passes. Independently probed `TypeAdapter(ControlLine).validate_python({'v':1,'seq':1,'type':'cmd','cmd':'fly','sent_ms':1,'ttl_ms':500})` — raises ValidationError. The inner cmd discriminator is closed."
