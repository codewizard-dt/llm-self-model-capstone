    notes: "`test_unknown_type_rejected` passes (type='telemetry' rejected). The outer callable-Discriminator + Tag pattern in control_command.py routes only 'cmd' → ControlCommand and 'heartbeat' → HeartbeatLine; everything else falls through to ValidationError."
  - id: acc-test-discriminator-missing-cmd
    verdict: pass
    notes: "`test_missing_cmd_on_cmd_line_rejected` passes — a `type:'cmd'` line with no `cmd` key raises ValidationError from the inner discriminated union."
