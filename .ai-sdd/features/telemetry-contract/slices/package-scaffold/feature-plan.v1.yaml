apiVersion: ai-sdd/v1
kind: FeaturePlan
metadata:
  feature: telemetry-contract
  slice: package-scaffold
  stack: contracts

summary: >-
  Scaffold the contracts/ Python 3.12 uv package skeleton only — infrastructure,
  no pydantic models yet — AND stand up the repo-root uv workspace + Makefile so
  the four FIXED deterministic gates (uv sync, make test, make validate, make lint),
  all run from the REPO ROOT, exit 0 on the otherwise-empty package. Create a root
  pyproject.toml declaring a uv workspace whose sole member is contracts/ (so root
  `uv sync` resolves the contracts package + its deps), the generated uv.lock, and
  the root Makefile delegating test/validate/lint/schema to contracts/ (with
  commented stubs for operator/coprocessor/brain/pilot). Create
  contracts/pyproject.toml (hatchling build, pydantic v2 >=2.12 <3, pytest dev dep),
  contracts/.python-version (3.12), contracts/ruff.toml (line-length 100, target
  py312, src=["src"]), contracts/Makefile (test/validate/lint/schema targets that
  exit 0 on the empty package), the src layout (contracts/src/contracts/__init__.py
  empty, contracts/tests/__init__.py empty), ONE trivial smoke test
  contracts/tests/test_smoke.py (so pytest collects >=1 test and never exits 5), a
  minimal contracts/src/contracts/validate.py (no fixtures present -> prints OK,
  exits 0), and an empty contracts/schemas/ directory. Acceptance is that all four
  root gate commands — `uv sync`, `make lint`, `make test`, `make validate`, run
  from repo root — exit 0 against the empty source tree.

scope:
  in:
    - "Root pyproject.toml (repo root) — declares a uv workspace via [tool.uv.workspace] members=[\"contracts\"] so root `uv sync` resolves the contracts package + its deps; a minimal [project] table (name e.g. llm-self-model-capstone, version 0.0.0, requires-python >=3.12) sufficient for uv to treat the root as a workspace root. NOT a hatchling-built distributable — just the workspace anchor."
    - "uv.lock (repo root) — generated by `uv sync` at repo root; commits the resolved lockfile for the workspace (root + contracts member)"
    - "Root Makefile (repo root) — .PHONY validate test lint schema, each delegating to `$(MAKE) -C contracts <target>` (per requirements D3), plus commented stubs for operator / coprocessor / brain / pilot. These targets must each exit 0 after this slice because the contracts/ targets they delegate to exit 0 on the empty package."
    - "contracts/pyproject.toml — hatchling build-system, project name=contracts version=0.1.0, requires-python >=3.12, dependencies pydantic>=2.12,<3, dev/optional pytest>=8, [tool.hatch.build.targets.wheel] packages=[\"src/contracts\"], [tool.uv] dev-dependencies pytest>=8"
    - "contracts/.python-version pinning 3.12"
    - "contracts/ruff.toml — line-length=100, target-version=py312, src=[\"src\"]"
    - "contracts/Makefile — .PHONY targets test, validate, lint, schema running via `uv run` (UV := uv run); lint/test/validate must exit 0 on the empty package (see decisions PD4, PD7, PD8); schema target is present but ungated (PD5)"
    - "contracts/src/contracts/__init__.py — empty (models added in the pydantic-models slice)"
    - "contracts/src/contracts/validate.py — minimal validator: globs contracts/fixtures/*.jsonl; with no fixtures dir/files present prints \"OK\" and exits 0; defers importing ContractLine until fixtures exist (no-op on empty tree this slice)"
    - "contracts/tests/__init__.py — empty"
    - "contracts/tests/test_smoke.py — ONE trivial smoke test (asserts `import contracts` succeeds) so pytest collects >=1 test and `make test` does not exit 5"
    - "contracts/schemas/ — directory created empty (populated by the pydantic-models slice; keep with a .gitkeep so the empty dir is committed)"
    - "Run `uv sync` at REPO ROOT so the root lockfile (uv.lock) and workspace virtualenv resolve cleanly against the empty tree (also resolves contracts member deps: pydantic>=2.12,<3, pytest>=8)"
  out:
    - "Any pydantic models (ContractLine, MotorApiSample, MotorApiValues, VisionBlock, ContractSource, AprilTagPose) — deferred to the pydantic-models slice"
    - "motor_telemetry.py migration from robot/pi-runtime — deferred (D5, later slice)"
    - "contracts.schema module + the Makefile `schema` target wiring — NOT created/gated this slice (no models to export yet); `schema` is intentionally left ungated (PD5). NOTE: contracts.validate IS created this slice as a minimal no-op so `make validate` can be gated (moved into scope.in)."
    - "JSON Schema export (contracts/schemas/contract_line.json) — deferred to the models/schema slice"
    - "JSONL fixtures (contracts/fixtures/) — deferred. The validate.py created this slice handles the no-fixtures case (prints OK, exits 0); real fixture validation against ContractLine lands with the models slice."
    - "Tests with real domain assertions — deferred. Only the single trivial smoke test (import contracts) is created this slice, purely so pytest collects >=1 test and `make test` exits 0."
    - "Filling in operator / coprocessor / brain / pilot Makefile delegations (kept as commented stubs only, per D3)"
    - "Adapter interfaces (F4), oracle (F14), replay sources (F15), control grammar (F19)"

acceptance:
  - id: AC1
    description: >-
      root-uv-sync-clean — `uv sync` run from the REPO ROOT exits 0. The root
      pyproject.toml declares a uv workspace ([tool.uv.workspace] members=["contracts"]),
      so root sync resolves the contracts member and its deps (pydantic>=2.12,<3,
      pytest>=8) and writes uv.lock at the repo root. This satisfies the FIXED
      changeset.build gate (`uv sync`, run from repo root, required:true).
  - id: AC2
    description: >-
      root-make-lint-exit0 — `make lint` run from the REPO ROOT exits 0. The root
      Makefile delegates via `$(MAKE) -C contracts lint`, which runs
      `uv run ruff check src/ tests/` then `uv run ruff format --check src/ tests/`
      over the minimal files (empty __init__.py, smoke test, validate.py) with no
      violations. Satisfies the FIXED changeset.lint gate (`make lint`, repo root).
  - id: AC3
    description: >-
      root-make-test-exit0 — `make test` run from the REPO ROOT exits 0. The root
      Makefile delegates via `$(MAKE) -C contracts test`, which runs pytest; the
      single contracts/tests/test_smoke.py (asserts `import contracts`) guarantees
      pytest collects >=1 test and does NOT exit 5 (no-tests-collected). Satisfies
      the FIXED changeset.test gate (`make test`, repo root).
  - id: AC4
    description: >-
      root-make-validate-exit0 — `make validate` run from the REPO ROOT exits 0.
      The root Makefile delegates via `$(MAKE) -C contracts validate`, which runs
      contracts/src/contracts/validate.py; with no contracts/fixtures/*.jsonl present
      it prints "OK" and exits 0 (and does NOT import ContractLine, which does not
      exist yet). Satisfies the FIXED changeset.validate gate (`make validate`, repo
      root).
  - id: AC5
    description: >-
      root-makefile-delegates — a repo-root Makefile exists defining .PHONY
      validate / test / lint / schema, each delegating to `$(MAKE) -C contracts
      <target>` (per requirements D3), with commented stubs for operator /
      coprocessor / brain / pilot. The delegating test/validate/lint targets all
      exit 0 after this slice.
  - id: AC6
    description: >-
      package-layout-correct — the src layout is in place and import-ready: root
      pyproject.toml declares [tool.uv.workspace] members=["contracts"];
      contracts/pyproject.toml declares hatchling with packages=["src/contracts"];
      contracts/.python-version reads 3.12; contracts/ruff.toml sets line-length=100 /
      target-version=py312 / src=["src"]; contracts/src/contracts/__init__.py and
      contracts/tests/__init__.py exist and are empty; and `from contracts import ...`
      resolves (smoke test imports the package successfully).
  - id: AC7
    description: >-
      schemas-dir-exists — the contracts/schemas/ directory exists (empty,
      committed via .gitkeep) ready to receive contract_line.json in a later slice.

decisions:
  - id: PD1
    title: This slice creates the repo-root Makefile with delegating targets and commented vertical stubs
    decision: >-
      Create the repo-root Makefile now, with validate/test/lint/schema each
      delegating to `$(MAKE) -C contracts <target>`, and no-op commented stubs
      for operator / coprocessor / brain / pilot to be filled in by later features.
      Root `make lint` is runnable immediately after this slice.
    grounds: "requirements D3 (Root Makefile ownership); slice brief 'Files to create' root Makefile block"
    status: closed
  - id: PD2
    title: src layout with empty public-API __init__
    decision: >-
      Use the src layout contracts/src/contracts/ with hatchling
      packages=["src/contracts"]; __init__.py is empty this slice (re-exports of
      ContractLine/MotorApiSample/VisionBlock are added when the models land).
      Stable import target `from contracts import ...` is established by the layout.
    grounds: "requirements D4 (Package layout: src layout, hatchling); slice brief pyproject.toml block"
    status: closed
  - id: PD3
    title: uv for dependency management and venv
    decision: >-
      Manage dependencies and the virtualenv with uv (`uv sync`); pin via the
      uv lockfile. No pip / poetry / pip-tools / conda. Pydantic v2 (>=2.12,<3)
      and pytest>=8 are declared on the contracts member but only resolution is
      exercised this slice. (The lockfile lives at the REPO ROOT, not in
      contracts/, because the gates run `uv sync` from repo root — see PD7.)
    grounds: "MASTER_REQUIREMENTS ADR-15 (Python deps = uv); contracts convention 'Build / install' row"
    status: closed
  - id: PD7
    title: Root uv workspace anchors `uv sync` at the repo root (gating reality)
    decision: >-
      The ai-sdd deterministic gates are FIXED commands run from the REPO ROOT and
      all are required:true on every slice — changeset.build=`uv sync`,
      changeset.test=`make test`, changeset.validate=`make validate`,
      changeset.lint=`make lint`. At present there is NO root pyproject.toml, NO
      root Makefile, NO uv.lock, so `uv sync` errors ("No pyproject.toml found") and
      `make *` fails. Therefore this slice MUST add a root pyproject.toml declaring a
      uv workspace ([tool.uv.workspace] members=["contracts"]) plus a minimal
      [project] table (requires-python >=3.12) so the repo root is a valid uv
      workspace root; running `uv sync` at the root then resolves the contracts
      member and writes uv.lock at the root. The root Makefile (PD1) delegates the
      other three gates to contracts/. The package-scaffold slice's responsibility is
      to make all four FIXED root gate commands exit 0 on the otherwise-empty package.
    grounds: "discovered gating reality (FIXED root gates, all required:true; empirically no root pyproject.toml/Makefile/uv.lock); MASTER_REQUIREMENTS ADR-15 (Python deps = uv, uv workspace is the uv-native multi-package mechanism); requirements D3 (root Makefile delegates to contracts/)"
    status: closed
  - id: PD4
    title: ruff is the only lint/format tool; make lint = check + format --check
    decision: >-
      Lint and format with ruff only. contracts/Makefile `lint` runs
      `ruff check src/ tests/` then `ruff format --check src/ tests/`. ruff.toml
      sets line-length=100, target-version=py312, src=["src"]. No black / isort /
      flake8 / pylint.
    grounds: "MASTER_REQUIREMENTS ADR-16 (lint/format = ruff); contracts convention 'Lint / format' row; slice brief ruff.toml + Makefile blocks"
    status: closed
  - id: PD5
    title: contracts/Makefile test/validate/lint must exit 0 this slice; schema target is present but ungated
    decision: >-
      Per the discovered gating reality (PD7), three of the four FIXED root gates
      delegate into contracts/ — make test, make validate, make lint — and each
      MUST exit 0 on the empty package this slice. So: `lint` runs ruff check +
      format --check (passes on minimal files); `test` runs pytest with one trivial
      smoke test so collection yields >=1 test and pytest never exits 5; `validate`
      runs contracts/src/contracts/validate.py which prints OK and exits 0 when no
      fixtures are present (PD8). The `schema` target is also carried in the Makefile
      but references contracts.schema (does not exist yet) and is NOT one of the four
      FIXED gates, so it is intentionally left UNGATED — it is fine if `make schema`
      would fail this slice; it becomes runnable when the models/schema slice lands.
    grounds: "discovered gating reality (PD7: changeset.test/validate/lint are FIXED required gates run from repo root, delegated to contracts/; changeset has no `schema` gate); requirements In-scope 'contracts/Makefile targets validate/test/lint/schema'"
    status: closed
  - id: PD6
    title: schemas/ committed empty via .gitkeep
    decision: >-
      Create contracts/schemas/ as an empty directory and commit it with a
      .gitkeep placeholder so the directory exists in the tree before
      contract_line.json is generated in a later slice.
    grounds: "slice brief Acceptance ('contracts/schemas/ directory exists (empty; populated by pydantic-models slice)')"
    status: closed
  - id: PD8
    title: Trivial smoke test + no-op validate.py make `make test` and `make validate` exit 0 on the empty package
    decision: >-
      To make the FIXED test and validate gates exit 0 before any real models or
      fixtures exist, this slice creates two minimal artifacts. (1)
      contracts/tests/test_smoke.py — a single test asserting `import contracts`
      succeeds; pytest then collects >=1 test and returns 0 instead of exit code 5
      (no tests collected). (2) contracts/src/contracts/validate.py — globs
      contracts/fixtures/*.jsonl, and when the fixtures dir is empty/absent prints
      "OK" and exits 0 WITHOUT importing ContractLine (which does not exist yet).
      The ContractLine import / per-line validation is deferred and added once
      fixtures land (kept simple: no fixtures -> print OK -> exit 0). Both are
      deliberately throwaway-minimal and superseded by real tests/validation in the
      models slice.
    grounds: "discovered gating reality (PD7); pytest exit-5 semantics (no tests collected); slice instruction (one trivial smoke test; validate.py exits 0 on empty fixtures, skipping the ContractLine import until fixtures exist)"
    status: closed

files:
  - "contracts/"
  - "Makefile"
  - "pyproject.toml"
  - "uv.lock"

tests:
  - "uv sync"
  - "make lint"
  - "make test"
  - "make validate"
