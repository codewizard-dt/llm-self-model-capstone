items:
  - id: ACC-LOADER-CONTRACTLINE
    verdict: pass
    notes: >-
      self_model_generator/src/self_model_generator/fixture_loader.py reads
      telemetry-fixtures/grab-align-baseline/contract.jsonl by default, skips only blank lines,
      requires at least one record, and validates each non-empty JSONL record with
      contracts.ContractLine.model_validate_json. The operator smoke test asserts the resolved
      fixture path and that every loaded record is a ContractLine.
  - id: ACC-DOWNSTREAM-FIELDS
    verdict: pass
    notes: >-
      test_loaded_evidence_exposes_downstream_fields_without_reshaping loads a ContractLine and
      asserts the existing task, predicted, gap, outcome, motor_samples, and optional vision
      attributes directly on that model. The loader returns ContractLine instances and does not
      introduce a self_model_generator-local evidence schema or reshaped DTO.
  - id: ACC-FINITE-GAP
    verdict: pass
    notes: >-
      test_loaded_fixture_contains_finite_numeric_gap_residual flattens the loaded ContractLine gap
      dictionaries and requires at least one math.isfinite numeric residual, proving the committed
      fixture carries consumable signed gap evidence for later F8/F10 work.
  - id: ACC-NO-ROS-MCAP-IMPORTS
    verdict: pass
    notes: >-
      The fixture loader imports only argparse, pathlib, typing, and contracts.ContractLine. The
      targeted smoke snapshots forbidden modules before import/load and verifies no rclpy,
      rosbag2_py, mcap, camera_ros, picamera2, serial, robot/pi-runtime, or robot/ros2-runtime module
      appears during the downstream fixture-loading path.
  - id: ACC-REUSABLE-SURFACE
    verdict: pass
    notes: >-
      The reusable self_model_generator.fixture_loader module exposes fixture_evidence_path,
      load_contract_jsonl, and load_fixture_contract_lines, and self_model_generator.__init__ reexports
      the loader helpers for upcoming self_model_generator work. The behavior is not embedded solely in tests.
  - id: ACC-FROZEN-SCHEMAS-UNCHANGED
    verdict: pass
    notes: >-
      git status shows changes only to the root Makefile and self_model_generator files; contracts,
      .ai-sdd/schemas, and telemetry-fixtures are unchanged. Validation relies on the existing
      runtime contracts.ContractLine model, with no schema defined or changed outside contracts.
verdict: approve
rework: []
