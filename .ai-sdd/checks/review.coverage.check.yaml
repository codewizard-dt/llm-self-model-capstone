apiVersion: ai-sdd/v1
kind: Check
metadata: { name: review.coverage }
spec:
  # Tier-2 intent "review items ⊇ feature-plan.acceptance" → trusted executor `ai-sdd cover`.
  checkKind: deterministic
  command: "ai-sdd cover --plan .ai-sdd/artifacts/feature-plan.v1.yaml --review .ai-sdd/artifacts/review.v1.yaml"
  required: true
