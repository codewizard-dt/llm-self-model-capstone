apiVersion: ai-sdd/v1
kind: Check
metadata: { name: feature-plan.structure }
spec:
  # Tier-1 structural gate (trusted executor `ai-sdd check`). Non-empty acceptance with ids, all
  # decisions closed, files under the repo's verticals/factory surfaces.
  checkKind: deterministic
  command: "ai-sdd check .ai-sdd/schemas/feature-plan.schema.yaml .ai-sdd/artifacts/feature-plan.v1.yaml"
  required: true
