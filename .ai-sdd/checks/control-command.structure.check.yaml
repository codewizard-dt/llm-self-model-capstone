apiVersion: ai-sdd/v1
kind: Check
metadata: { name: control-command.structure }
spec:
  # CONTROL-GRAMMAR gate (DRAFT contract). Validates the committed control-command fixture against the
  # schema envelope so the control grammar stays valid every slice. Trusted executor; blocking. The
  # OPEN parts (arm vocabulary, multiplex) are not in the envelope, so the structural gate is stable.
  checkKind: deterministic
  command: "ai-sdd check .ai-sdd/schemas/control-command.schema.yaml .ai-sdd/schemas/examples/control-command.example.json"
  required: true
