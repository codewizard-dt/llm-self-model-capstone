apiVersion: ai-sdd/v1
kind: Check
metadata: { name: changeset.diff-in-scope }
spec:
  # Tier-2 intent "changed files ⊆ feature-plan.files" → trusted executor `ai-sdd scope` (blocking,
  # no eval gate — verified by the engine's own tests).
  checkKind: deterministic
  command: "ai-sdd scope --plan .ai-sdd/artifacts/feature-plan.v1.yaml --repo ."
  required: true
