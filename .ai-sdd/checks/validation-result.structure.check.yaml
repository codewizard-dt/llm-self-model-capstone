apiVersion: ai-sdd/v1
kind: Check
metadata: { name: validation-result.structure }
spec:
  # Tier-1 milestone verdict gate (compiled from validation-result.schema.yaml). A `fail` outcome or
  # any failed criterion fails the check → the milestone re-validates. Used by program-plan milestones.
  checkKind: deterministic
  command: "ai-sdd check .ai-sdd/schemas/validation-result.schema.yaml .ai-sdd/artifacts/validation-result.v1.yaml"
  required: true
